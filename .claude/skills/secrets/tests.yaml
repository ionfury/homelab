version: 1
skill: secrets
description: "Verify secret mechanism selection, decision tree routing, and cross-namespace replication patterns surface correctly"
tests:
  - id: SEC-01
    description: "Routes ephemeral random secrets to secret-generator, not ExternalSecret"
    category: routing
    severity: high
    prompt: |
      I need to add a session secret for a new web application. It can be any random 32-byte value and does not need to survive a full cluster rebuild. What mechanism should I use and what does the manifest look like?
    scoring:
      mode: keywords
      keywords:
        required:
          - secret-generator
          - autogenerate
          - mittwald
        forbidden:
          - ExternalSecret
          - aws-ssm
          - SSM
          - commit
    expect_refusal: false
    manual_review: false
    expected_behavior: |
      Recommends secret-generator (mittwald/kubernetes-secret-generator) with the autogenerate annotation. Should show a manifest with secret-generator.v1.mittwald.de/autogenerate annotation. Must NOT suggest ExternalSecret or storing anything in SSM for an ephemeral secret.
    tags:
      - trimmed-2026-03-22
      - secrets-skill

  - id: SEC-02
    description: "Routes persistent generated secrets to app-secrets Terragrunt module + ExternalSecret"
    category: routing
    severity: high
    prompt: |
      I need to generate an encryption key seed for LDAP. It must be randomly generated but must also survive a full cluster wipe and rebuild — if it changes, all encrypted data is lost. What mechanism should I use?
    scoring:
      mode: keywords
      keywords:
        required:
          - app-secrets
          - Terragrunt
          - ExternalSecret
          - SSM
        any_of:
          - prevent_destroy
          - ignore_changes
          - persist
        forbidden:
          - secret-generator
          - commit
    expect_refusal: false
    manual_review: false
    expected_behavior: |
      Recommends the app-secrets Terragrunt module to generate the secret and store it in AWS SSM, then an ExternalSecret to pull it into the cluster. Should mention lifecycle.prevent_destroy and/or lifecycle.ignore_changes. Must NOT recommend secret-generator since the secret must persist across rebuilds.
    tags:
      - trimmed-2026-03-22
      - secrets-skill

  - id: SEC-03
    description: "Routes external credential (OAuth client secret) to ExternalSecret from AWS SSM"
    category: routing
    severity: high
    prompt: |
      I have an OAuth2 client secret from Google that I need to inject into my application. It is a fixed value assigned by Google — I cannot change it. How do I get this into the cluster?
    scoring:
      mode: keywords
      keywords:
        required:
          - ExternalSecret
          - SSM
          - aws-ssm
        any_of:
          - ClusterSecretStore
          - /homelab/kubernetes
          - remoteRef
        forbidden:
          - secret-generator
          - autogenerate
          - commit
    expect_refusal: false
    manual_review: false
    expected_behavior: |
      Recommends storing the value in AWS SSM Parameter Store and creating an ExternalSecret referencing the aws-ssm ClusterSecretStore. Should show the SSM path convention /homelab/kubernetes/${cluster_name}/<app>/... and the ExternalSecret spec. Must NOT suggest secret-generator since the value is externally assigned.
    tags:
      - trimmed-2026-03-22
      - secrets-skill

  - id: SEC-04
    description: "Correctly explains kubernetes-replicator for cross-namespace secret sharing"
    category: coverage
    severity: medium
    prompt: |
      The database namespace holds a generated superuser password secret. Several application namespaces (zipline, authelia) need to read that same secret. I do not want to duplicate the secret manually. What is the correct pattern?
    scoring:
      mode: both
      keywords:
        required:
          - replicator
          - replication-allowed
          - replicate-from
        any_of:
          - mittwald
          - replicator.v1.mittwald.de
          - replication-allowed-namespaces
        forbidden:
          - commit
          - copy manually
      judge_criteria: |
        Score 0-10 based on completeness of the replication pattern explanation:
        - 0-2: Misidentifies the mechanism or omits both source and consumer sides
        - 3-4: Mentions replicator but only covers one side (source OR consumer)
        - 5-6: Covers both source annotations (replication-allowed, replication-allowed-namespaces) and consumer annotation (replicate-from) but no YAML example
        - 7-8: Shows YAML for both source and consumer sides with correct annotation keys
        - 9-10: Full coverage including both sides with YAML, correct namespace/name format in replicate-from (namespace/secret-name), and note to register both files in kustomization.yaml
    expect_refusal: false
    manual_review: false
    expected_behavior: |
      Explains kubernetes-replicator with both sides: source Secret gets replication-allowed and replication-allowed-namespaces annotations; consumer namespaces create an empty Secret with replicate-from annotation pointing to source-namespace/secret-name. Both files must be registered in their respective kustomization.yaml files.
    tags:
      - trimmed-2026-03-22
      - secrets-skill

  - id: SEC-05
    description: "Decision tree surfaces the right question when intent is ambiguous"
    category: constraint
    severity: medium
    prompt: |
      I need to add an API key for my new application. I am not sure if it should be randomly generated or if there is a specific value I need to use.
    scoring:
      mode: keywords
      keywords:
        required:
          - randomly generated
        any_of:
          - external value
          - specific value
          - must match
          - AskUserQuestion
        forbidden:
          - commit
    expect_refusal: false
    manual_review: false
    expected_behavior: |
      Should ask the clarifying question from the decision tree: whether the secret can be randomly generated or must match a specific external value. Should not proceed with an implementation choice until this is clarified.
    tags:
      - trimmed-2026-03-22
      - secrets-skill

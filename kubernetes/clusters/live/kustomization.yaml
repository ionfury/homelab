---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform.yaml
  - config.yaml
  - helm-charts.yaml
  - chart-values.yaml
configMapGenerator:
  - name: cluster-vars
    options:
      disableNameSuffixHash: true
    namespace: flux-system
    behavior: create
    envs:
      - .cluster-vars.env
      - cluster-apps.env
  - name: cluster-versions
    options:
      disableNameSuffixHash: true
    namespace: flux-system
    behavior: create
    envs:
      - versions.env

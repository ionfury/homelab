---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Pulls SimpleFIN access URL from AWS SSM for Sure bank sync integration.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sure-simplefin-credentials
  namespace: sure
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: sure-simplefin-credentials
  data:
    - secretKey: access_url
      remoteRef:
        key: /homelab/kubernetes/live/sure-simplefin-credentials
        property: access_url

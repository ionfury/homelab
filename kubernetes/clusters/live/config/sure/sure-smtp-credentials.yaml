---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Pulls SMTP relay credentials from AWS SSM for Sure email notifications.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sure-smtp-credentials
  namespace: sure
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: sure-smtp-credentials
  data:
    - secretKey: address
      remoteRef:
        key: /homelab/kubernetes/live/sure-smtp-credentials
        property: address
    - secretKey: username
      remoteRef:
        key: /homelab/kubernetes/live/sure-smtp-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: /homelab/kubernetes/live/sure-smtp-credentials
        property: password
    - secretKey: sender
      remoteRef:
        key: /homelab/kubernetes/live/sure-smtp-credentials
        property: sender

---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: sure
  namespace: sure
spec:
  clusterRef:
    name: garage
    namespace: garage
  neverExpires: true
  bucketPermissions:
    - bucketRef:
        name: sure
        namespace: garage
      read: true
      write: true
  secretTemplate:
    name: sure-s3-credentials

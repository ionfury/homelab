---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: valheim-default
  namespace: valheim
spec:
  description: "Allow Valheim game server: UDP game + Steam matchmaking traffic, HTTPS egress for SteamCMD"
  endpointSelector: { }
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "2456"
              protocol: UDP
            - port: "2457"
              protocol: UDP
  egress:
    # Game server sends UDP responses to connected clients
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "2456"
              protocol: UDP
            - port: "2457"
              protocol: UDP
    # Steam matchmaking and server registration (UDP to Steam backend)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "27028"
              protocol: UDP
    # SteamCMD downloads and Steam API authentication
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

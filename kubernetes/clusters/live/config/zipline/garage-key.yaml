---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: zipline
  namespace: garage
spec:
  clusterRef:
    name: garage
  neverExpires: true
  bucketPermissions:
    - bucketRef:
        name: zipline
      read: true
      write: true
  secretTemplate:
    name: zipline-s3-credentials
    namespace: zipline

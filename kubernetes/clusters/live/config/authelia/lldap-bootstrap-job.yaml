---
apiVersion: batch/v1
kind: Job
metadata:
  name: lldap-bootstrap
  namespace: authelia
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lldap-bootstrap
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: ghcr.io/lldap/lldap:v0.6.2
          command: ["/bin/bash", "/scripts/bootstrap.sh"]
          env:
            - name: LLDAP_URL
              value: "http://lldap.authelia.svc.cluster.local:17170"
            - name: LLDAP_ADMIN_USERNAME
              value: admin
            - name: LLDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lldap-secrets
                  key: LLDAP_LDAP_USER_PASS
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: scripts
          configMap:
            name: lldap-bootstrap-scripts
            defaultMode: 0555

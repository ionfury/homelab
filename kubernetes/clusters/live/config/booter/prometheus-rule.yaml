---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: booter-alerts
  namespace: booter
  labels:
    prometheus: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: booter.rules
      rules:
        - alert: BooerDaemonSetNotFullyReady
          expr: |
            (
              kube_daemonset_status_number_ready{namespace="booter", daemonset="booter"}
              / kube_daemonset_status_desired_number_scheduled{namespace="booter", daemonset="booter"}
            ) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Booter DaemonSet is not fully ready on all nodes"
            description: "{{ $value | humanizePercentage }} of booter pods are ready. PXE booting may be unavailable on some nodes."

        - alert: BooerBootAssetUnreachable
          expr: |
            probe_success{job="blackbox", instance=~"https://pxe.factory.talos.dev/.*"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Talos image factory PXE endpoint is unreachable"
            description: "The Talos image factory at pxe.factory.talos.dev is not responding. PXE boot asset downloads will fail."

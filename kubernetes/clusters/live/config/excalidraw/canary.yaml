---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/canaries.flanksource.com/canary_v1.json
apiVersion: canaries.flanksource.com/v1
kind: Canary
metadata:
  name: http-check-excalidraw
  namespace: excalidraw
spec:
  schedule: "@every 1m"
  http:
    - name: excalidraw-frontend
      url: https://draw.${external_domain}
      responseCodes: [200]
      maxSSLExpiry: 7
      thresholdMillis: 5000
    - name: excalidraw-room
      # Socket.IO long-polling transport endpoint returns 200 when the relay is healthy
      url: https://draw-ws.${external_domain}/socket.io/?EIO=4&transport=polling
      responseCodes: [200]
      maxSSLExpiry: 7
      thresholdMillis: 5000

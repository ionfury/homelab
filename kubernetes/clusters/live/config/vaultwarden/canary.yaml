---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/canaries.flanksource.com/canary_v1.json
apiVersion: canaries.flanksource.com/v1
kind: Canary
metadata:
  name: vaultwarden-health
  namespace: vaultwarden
spec:
  schedule: "@every 1m"
  http:
    - name: vaultwarden-alive
      url: https://vault.${internal_domain}/alive
      responseCodes: [200]
      maxSSLExpiry: 7
      thresholdMillis: 5000

# AUTH_SECRET — must be ≥32 characters; auto-generated by secret-generator
apiVersion: v1
kind: Secret
metadata:
  name: papra-auth-secret
  namespace: papra
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: auth-secret
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "64"
data: { }

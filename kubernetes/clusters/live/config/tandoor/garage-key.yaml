---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: tandoor
  namespace: garage
spec:
  clusterRef:
    name: garage
  neverExpires: true
  bucketPermissions:
    - bucketRef: tandoor
      read: true
      write: true
  secretTemplate:
    name: tandoor-s3-credentials
    namespace: tandoor

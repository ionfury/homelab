---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homepage-widget-egress
  namespace: homepage
spec:
  description: "Allow Homepage widget calls to application namespaces (non-API-key widgets only)"
  endpointSelector: { }
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8265"
              protocol: TCP
            - port: "9999"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: longhorn-system
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: minecraft
      toPorts:
        - ports:
            - port: "25565"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: valheim
      toPorts:
        - ports:
            - port: "2457"
              protocol: UDP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: satisfactory
      toPorts:
        - ports:
            - port: "7777"
              protocol: UDP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: factorio
      toPorts:
        - ports:
            - port: "34197"
              protocol: UDP

---
# Recyclarr configuration for syncing TRaSH Guides quality profiles and custom formats.
# Environment variables are injected by the CronJob pod spec.
# Instances: sonarr (HD TV + anime TV), sonarr4k (4K TV),
#            radarr (HD movies + anime movies), radarr4k (4K movies).
# Anime profiles coexist on the same instance as their HD counterpart — recyclarr
# does not allow two instance configs sharing the same base_url (Split Instances error).
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      sonarr:
        base_url: http://sonarr.media.svc:8989
        api_key: !env_var SONARR_API_KEY

        quality_definition:
          type: series

        quality_profiles:
          - name: WEB-1080p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-1080p
              - name: HDTV-1080p
          - name: Anime
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p Remux
              until_score: 10000
            qualities:
              - name: Bluray-1080p Remux
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-1080p
              - name: HDTV-1080p
          - name: Anime Fallback
            min_format_score: -10000
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p Remux
              until_score: 10000
            qualities:
              - name: Bluray-1080p Remux
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-1080p
              - name: HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
              - name: DVD

        custom_formats:
          # Unwanted HDR for 1080p web releases
          - trash_ids:
              - 505d871304820ba7106b693be6fe4a9e # HDR
            assign_scores_to:
              - name: WEB-1080p
                score: -10000

          # Streaming Services

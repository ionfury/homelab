---
# Recyclarr configuration for syncing TRaSH Guides quality profiles and custom formats.
# Environment variables are injected by the CronJob pod spec.
# Instances: sonarr (HD TV), sonarr-anime (anime TV profile on same instance),
#            sonarr4k (4K TV), radarr (HD movies), radarr-anime (anime movies on same
#            instance), radarr4k (4K movies).
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      main:
        base_url: http://sonarr-app.media.svc:8989
        api_key: !env_var SONARR_API_KEY

        quality_definition:
          type: series

        quality_profiles:
          - name: WEB-1080p
            reset_unmatched_scores:
              enabled: true

        custom_formats:
          # Unwanted HDR for 1080p web releases
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47c8b789 # DV (WEBDL)
              - 9b27ab6c6f2f29a3282c0e28a3e26e55 # DV HDR10Plus

              - bb019e1cd00f304f80571c630e4be3ba # HDR (undefined)
              - 3497f2e847b8ea2da074e8afb9c35905 # HDR10
              - a3d82bf24ed956a1ce68a716e4bc9e41 # HDR10Plus
              - 2b239ed870daba8126a53bd3f457571e # HLG
              - 17e889ce13117940092308f48b48b45b # PQ
            assign_scores_to:
              - name: WEB-1080p
                score: -10000

          # Streaming Services

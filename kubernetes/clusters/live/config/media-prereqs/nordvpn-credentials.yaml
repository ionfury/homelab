---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# NordVPN OpenVPN credentials for Gluetun VPN sidecar.
# Stored in AWS SSM as a JSON object with OPENVPN_USER and OPENVPN_PASSWORD keys.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nordvpn-credentials
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: nordvpn-credentials
  data:
    - secretKey: OPENVPN_USER
      remoteRef:
        key: /homelab/kubernetes/live/nordvpn-credentials
        property: OPENVPN_USER
    - secretKey: OPENVPN_PASSWORD
      remoteRef:
        key: /homelab/kubernetes/live/nordvpn-credentials
        property: OPENVPN_PASSWORD

---
controllers:
  main:
    containers:
      main:
        image:
          # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
          tag: v2.5.5
        env:
          DB_HOSTNAME: immich-database-rw.database.svc.cluster.local
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: cnpg-immich-database-app
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: cnpg-immich-database-app
                key: password
          REDIS_HOSTNAME: dragonfly.cache.svc.cluster.local
          REDIS_PORT: "6379"
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: dragonfly-password
                key: password
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi

immich:
  metrics:
    enabled: true
  persistence:
    library:
      existingClaim: immich-library
  configuration: { }
  configurationKind: ConfigMap

valkey:
  enabled: false

server:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 4Gi

machine-learning:
  enabled: true
  controllers:
    main:
      strategy: Recreate
      pod:
        runtimeClassName: nvidia
        nodeSelector:
          nvidia.com/gpu.present: "true"
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            tag: "${immich_ml_cuda_tag}"
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
            HF_XET_CACHE: /cache/huggingface-xet
            MPLCONFIGDIR: /cache/matplotlib-config
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 4Gi
              nvidia.com/gpu: 1
  persistence:
    cache:
      enabled: true
      size: 10Gi
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: fast

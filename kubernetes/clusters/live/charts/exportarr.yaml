---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# Exportarr: Prometheus metrics exporter for *arr applications
# Each controller runs a dedicated exporter instance for one *arr app
controllers:
  sonarr:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/onedr0p/exportarr
          tag: "${exportarr_version}"
        args: ["sonarr"]
        env:
          PORT: "9707"
          URL: "http://sonarr.media.svc.cluster.local:8989"
          API_KEY:
            valueFrom:
              secretKeyRef:
                name: sonarr-api-key
                key: api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9707
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9707
              periodSeconds: 10

  radarr:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:

service:
  sonarr:
    controller: sonarr
    ports:
      metrics:
        port: 9707
  radarr:
    controller: radarr
    ports:
      metrics:
        port: 9708
  prowlarr:
    controller: prowlarr
    ports:
      metrics:
        port: 9709
  sonarr4k:
    controller: sonarr4k
    ports:
      metrics:
        port: 9710
  radarr4k:
    controller: radarr4k
    ports:
      metrics:
        port: 9711
  bazarr:
    controller: bazarr
    ports:
      metrics:
        port: 9712
  sabnzbd:
    controller: sabnzbd
    ports:
      metrics:
        port: 9713

serviceMonitor:
  sonarr:
    enabled: true
    serviceName: exportarr-sonarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s
  radarr:
    enabled: true
    serviceName: exportarr-radarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s
  prowlarr:
    enabled: true
    serviceName: exportarr-prowlarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s
  sonarr4k:
    enabled: true
    serviceName: exportarr-sonarr4k
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics

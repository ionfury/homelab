---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# Exportarr: Prometheus metrics exporter for *arr applications
# Each controller runs a dedicated exporter instance for one *arr app
controllers:
  sonarr:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/onedr0p/exportarr
          tag: "${exportarr_version}"
        args: ["sonarr"]
        env:
          PORT: "9707"
          URL: "http://sonarr.media.svc.cluster.local:8989"
          API_KEY:
            valueFrom:
              secretKeyRef:
                name: exportarr-api-keys
                key: sonarr-api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9707
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9707
              periodSeconds: 10

  radarr:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/onedr0p/exportarr
          tag: "${exportarr_version}"
        args: ["radarr"]
        env:
          PORT: "9708"
          URL: "http://radarr.media.svc.cluster.local:7878"
          API_KEY:
            valueFrom:
              secretKeyRef:
                name: exportarr-api-keys
                key: radarr-api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9708
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9708
              periodSeconds: 10

  prowlarr:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/onedr0p/exportarr
          tag: "${exportarr_version}"
        args: ["prowlarr"]
        env:
          PORT: "9709"
          URL: "http://prowlarr.media.svc.cluster.local:9696"
          API_KEY:
            valueFrom:
              secretKeyRef:
                name: exportarr-api-keys
                key: prowlarr-api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9709
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 9709
              periodSeconds: 10

service:
  sonarr:
    controller: sonarr
    ports:
      metrics:
        port: 9707
  radarr:
    controller: radarr
    ports:
      metrics:
        port: 9708
  prowlarr:
    controller: prowlarr
    ports:
      metrics:
        port: 9709

serviceMonitor:
  sonarr:
    enabled: true
    serviceName: sonarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s
  radarr:
    enabled: true
    serviceName: radarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s
  prowlarr:
    enabled: true
    serviceName: prowlarr
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 4m
        scrapeTimeout: 90s

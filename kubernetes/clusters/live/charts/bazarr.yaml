---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  bazarr:
    type: deployment

    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    initContainers:
      config-patch:
        image:
          repository: docker.io/mikefarah/yq
          tag: "${yq_version}"
        command: [sh, -c]
        args:
          - |
            [ -f /config/config/config.yaml ] &&
            yq -i '.auth.apikey = strenv(BAZARR_API_KEY)' /config/config/config.yaml
        env:
          BAZARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: bazarr-api-key
                key: api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/bazarr
          tag: "${bazarr_version}"
        env:
          BAZARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: bazarr-api-key
                key: api-key
          POSTGRES_ENABLED: "true"
          POSTGRES_HOST: platform-rw.database.svc.cluster.local
          POSTGRES_PORT: "5432"
          POSTGRES_DATABASE: bazarr
          POSTGRES_USERNAME: bazarr
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: bazarr-db-credentials
                key: password
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/system/ping
                port: 6767
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/system/ping
                port: 6767
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/system/ping
                port: 6767
              periodSeconds: 10

service:
  app:
    controller: bazarr
    ports:
      http:
        port: 6767

route:
  internal:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Bazarr"
      gethomepage.dev/group: "Media"
      gethomepage.dev/icon: "bazarr.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=bazarr"
    parentRefs:
      - name: internal
        namespace: istio-gateway
    hostnames:
      - "bazarr.${internal_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 6767

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: fast
    advancedMounts:
      bazarr:
        config-patch:
          - path: /config
        app:
          - path: /config
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-00
  media-library-01:
    type: persistentVolumeClaim
    existingClaim: media-library-01
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-01
  media-library-02:
    type: persistentVolumeClaim
    existingClaim: media-library-02
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-02
  media-library-03:
    type: persistentVolumeClaim
    existingClaim: media-library-03
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-03
  media-library-04:
    type: persistentVolumeClaim
    existingClaim: media-library-04
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-04
  media-library-05:
    type: persistentVolumeClaim
    existingClaim: media-library-05
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-05
  media-library-06:
    type: persistentVolumeClaim
    existingClaim: media-library-06
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-06
  media-library-07:
    type: persistentVolumeClaim
    existingClaim: media-library-07
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-07
  media-library-08:
    type: persistentVolumeClaim
    existingClaim: media-library-08
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-08
  media-library-09:
    type: persistentVolumeClaim
    existingClaim: media-library-09
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-09
  media-library-10:
    type: persistentVolumeClaim
    existingClaim: media-library-10
    advancedMounts:
      bazarr:
        app:
          - path: /media/library/disk-10
  tmp:
    type: emptyDir
    advancedMounts:
      bazarr:
        config-patch:
          - path: /tmp
        app:
          - path: /tmp

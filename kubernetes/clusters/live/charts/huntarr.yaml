---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  huntarr:
    type: deployment

    pod:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    containers:
      app:
        image:
          repository: ghcr.io/plexguide/huntarr
          tag: "${huntarr_version}"
        env:
          PUID: "568"
          PGID: "568"
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 256Mi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: 9705
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: 9705
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: 9705
              periodSeconds: 10

service:
  app:
    controller: huntarr
    ports:
      http:
        port: 9705

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: fast
    advancedMounts:
      huntarr:
        app:
          - path: /config
  tmp:
    type: emptyDir
    advancedMounts:
      huntarr:
        app:
          - path: /tmp

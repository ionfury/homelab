---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  tdarr-node:
    type: deployment

    pod:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    # s6-overlay (LinuxServer.io) requires root to run its init system,
    # then drops to PUID/PGID via s6-applyuidgid. Capabilities needed:
    # SETUID/SETGID for user switching, CHOWN/DAC_OVERRIDE/FOWNER for
    # file ownership fixups during init.
    containers:
      app:
        image:
          repository: ghcr.io/haveagitgat/tdarr_node
          tag: "${tdarr_node_version}"
        env:
          TZ: UTC
          PUID: "568"
          PGID: "568"
          nodeName: gpu-worker
          serverURL: "http://tdarr-app.media.svc.cluster.local:8266"
          NVIDIA_DRIVER_CAPABILITIES: all
          NVIDIA_VISIBLE_DEVICES: all
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop: [ALL]
            add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
            nvidia.com/gpu: 1
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8267
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8267
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8267
              periodSeconds: 10

persistence:
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      tdarr-node:
        app:
          - path: /media/library
  transcode-cache:
    type: emptyDir
    advancedMounts:
      tdarr-node:
        app:
          - path: /app/transcode_cache
  run:
    type: emptyDir
    advancedMounts:
      tdarr-node:
        app:
          - path: /run

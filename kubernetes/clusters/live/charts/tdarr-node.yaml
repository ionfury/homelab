---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  tdarr-node:
    type: deployment

    pod:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    # Bypass s6-overlay init system by running Tdarr_Node directly.
    # s6-overlay's stage 250 s6-svwait has an internal timeout that
    # cannot be overridden by env vars, killing the node during its
    # encoder probe initialization every time.
    containers:
      app:
        image:
          repository: ghcr.io/haveagitgat/tdarr_node
          tag: "${tdarr_node_version}"
        command: ["/app/Tdarr_Node/Tdarr_Node"]
        env:
          TZ: UTC
          nodeName: gpu-worker
          serverURL: "http://tdarr.media.svc.cluster.local:8266"
          NVIDIA_DRIVER_CAPABILITIES: all
          NVIDIA_VISIBLE_DEVICES: all
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop: [ALL]
            add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
            nvidia.com/gpu: 1
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 15001
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 15001
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 15001
              periodSeconds: 10

persistence:
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      tdarr-node:
        app:
          - path: /media/library
  transcode-cache:
    type: emptyDir
    advancedMounts:
      tdarr-node:
        app:
          - path: /app/transcode_cache
  run:
    type: emptyDir
    advancedMounts:
      tdarr-node:
        app:
          - path: /run

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    seccompProfile:
      type: RuntimeDefault

controllers:
  excalidraw:
    type: deployment
    replicas: 1

    initContainers:
      # Prepare writable volumes for the main nginx container:
      # 1. Copy static assets and rewrite the collaboration URL so the main
      #    container can serve them with a read-only root filesystem.
      # 2. Pre-create nginx cache subdirectories with correct ownership (uid 101)
      #    so the main container can drop ALL capabilities including CAP_CHOWN.
      init-nginx:
        image:
          repository: excalidraw/excalidraw
          # renovate: datasource=docker depName=excalidraw/excalidraw versioning=loose
          tag: latest
        # LIMITATION: The upstream excalidraw image (nginx:alpine) has no USER
        # directive and requires root for the copy + chown operations. Running as
        # non-root would require a custom image build. CHOWN, DAC_OVERRIDE, and
        # FOWNER are required for chown -R on nginx cache directories.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
        command:
          - /bin/sh
          - -c
          - |
            cp -a /usr/share/nginx/html/* /mnt/html/ && \
            find /mnt/html/assets -type f -name '*.js' \
              -exec sed -i 's|https://oss-collab\.excalidraw\.com|https://draw-ws.${external_domain}|g' {} + && \
            for d in client_temp proxy_temp fastcgi_temp uwsgi_temp scgi_temp; do \
              mkdir -p /mnt/nginx-cache/$d; \
            done && \
            chown -R 101:101 /mnt/nginx-cache
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    containers:
      app:
        # LIMITATION: The upstream excalidraw image (nginx:alpine) has no USER
        # directive and runs the nginx master process as root for worker
        # management and port 80 binding. Running as non-root would require a
        # custom image with an unprivileged nginx config (listen 8080, pid in
        # /tmp). Capabilities are dropped and privilege escalation is denied to
        # minimize risk even while running as root.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        image:
          repository: excalidraw/excalidraw
          # renovate: datasource=docker depName=excalidraw/excalidraw versioning=loose
          tag: latest
        # Bypass the default docker-entrypoint.sh which calls chown on
        # /var/cache/nginx — the init container pre-creates those directories
        # with correct ownership so CAP_CHOWN is not needed.
        command: ["nginx", "-g", "daemon off;"]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 10

  room:
    type: deployment
    replicas: 1

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    containers:
      app:
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        image:
          repository: excalidraw/excalidraw-room
          # renovate: datasource=docker depName=excalidraw/excalidraw-room
          # LIMITATION: Upstream image uses Node.js 12 (EOL since April 2022).
          # This is a security risk but cannot be fixed without a custom image
          # build or switching to a maintained fork.
          tag: sha-03ff435
        env:
          PORT: "8080"
          YARN_CACHE_FOLDER: /tmp/.yarn-cache
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              periodSeconds: 10

persistence:
  # Writable /tmp for excalidraw-room: yarn needs a cache directory
  tmp:
    type: emptyDir
    advancedMounts:
      room:
        app:
          - path: /tmp
  # Pre-processed static assets with rewritten collaboration URLs.
  # The init container copies and patches files here; the main container
  # serves them read-only.
  html:
    type: emptyDir
    advancedMounts:
      excalidraw:
        init-nginx:
          - path: /mnt/html
        app:
          - path: /usr/share/nginx/html
            readOnly: true
  # Nginx runtime directories — required for read-only root filesystem.
  # nginx needs writable paths for cache, pid file, and temporary upload buffers.
  # The init container pre-creates subdirectories with nginx uid (101) ownership
  # so the main container can drop ALL capabilities including CAP_CHOWN.
  nginx-cache:
    type: emptyDir
    advancedMounts:
      excalidraw:
        init-nginx:
          - path: /mnt/nginx-cache
        app:
          - path: /var/cache/nginx
  nginx-run:
    type: emptyDir
    advancedMounts:
      excalidraw:
        app:
          - path: /var/run
  nginx-tmp:
    type: emptyDir
    advancedMounts:
      excalidraw:
        app:
          - path: /tmp

service:
  app:
    controller: excalidraw
    ports:
      http:
        port: 80
  room:
    controller: room
    ports:
      http:
        port: 8080

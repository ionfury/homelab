---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    seccompProfile:
      type: RuntimeDefault

controllers:
  excalidraw:
    type: deployment
    replicas: 1

    initContainers:
      # Copy static assets into a writable emptyDir and rewrite the collaboration
      # URL so the main nginx container can serve them with a read-only root
      # filesystem. The upstream image bakes https://oss-collab.excalidraw.com
      # into JS assets at build time.
      rewrite-collab-url:
        image:
          repository: excalidraw/excalidraw
          # renovate: datasource=docker depName=excalidraw/excalidraw
          tag: sha-4bfc5bb
        # LIMITATION: The upstream excalidraw image (nginx:alpine) has no USER
        # directive and requires root for the copy operation. Running as non-root
        # would require a custom image build. Capabilities are still dropped and
        # privilege escalation is denied to minimize risk.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        command:
          - /bin/sh
          - -c
          - |
            cp -a /usr/share/nginx/html/* /mnt/html/ && \
            find /mnt/html/static/js -type f -name '*.js' \
              -exec sed -i 's|https://oss-collab\.excalidraw\.com|https://draw-ws.${external_domain}|g' {} +
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

    containers:
      app:
        # LIMITATION: The upstream excalidraw image (nginx:alpine) has no USER
        # directive and runs the nginx master process as root for worker
        # management and port 80 binding. Running as non-root would require a
        # custom image with an unprivileged nginx config (listen 8080, pid in
        # /tmp). Capabilities are dropped and privilege escalation is denied to
        # minimize risk even while running as root.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        image:
          repository: excalidraw/excalidraw
          # renovate: datasource=docker depName=excalidraw/excalidraw
          tag: sha-4bfc5bb
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 10

  room:
    type: deployment
    replicas: 1

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    containers:
      app:
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        image:
          repository: excalidraw/excalidraw-room
          # renovate: datasource=docker depName=excalidraw/excalidraw-room
          # LIMITATION: Upstream image uses Node.js 12 (EOL since April 2022).
          # This is a security risk but cannot be fixed without a custom image
          # build or switching to a maintained fork.
          tag: sha-03ff435
        env:
          PORT: "8080"
          YARN_CACHE_FOLDER: /tmp/.yarn-cache
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              periodSeconds: 10

persistence:
  # Writable /tmp for excalidraw-room: yarn needs a cache directory
  tmp:
    type: emptyDir
    advancedMounts:
      room:
        app:
          - path: /tmp
  # Pre-processed static assets with rewritten collaboration URLs.
  # The init container copies and patches files here; the main container
  # serves them read-only.
  html:
    type: emptyDir
    advancedMounts:
      excalidraw:
        rewrite-collab-url:
          - path: /mnt/html
        app:
          - path: /usr/share/nginx/html
            readOnly: true
  # Nginx runtime directories — required for read-only root filesystem.
  # nginx needs writable paths for cache, pid file, and temporary upload buffers.
  nginx-cache:
    type: emptyDir
    advancedMounts:
      excalidraw:
        app:
          - path: /var/cache/nginx
  nginx-run:
    type: emptyDir
    advancedMounts:
      excalidraw:
        app:
          - path: /var/run
  nginx-tmp:
    type: emptyDir
    advancedMounts:
      excalidraw:
        app:
          - path: /tmp

service:
  app:
    controller: excalidraw
    ports:
      http:
        port: 80
  room:
    controller: room
    ports:
      http:
        port: 8080

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  qbittorrent:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    initContainers:
      gluetun:
        restartPolicy: Always
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: "${gluetun_version}"
        env:
          VPN_SERVICE_PROVIDER: nordvpn
          VPN_TYPE: wireguard
          WIREGUARD_PRIVATE_KEY:
            valueFrom:
              secretKeyRef:
                name: nordvpn-wireguard-credentials
                key: WIREGUARD_PRIVATE_KEY
          SERVER_COUNTRIES: United States
          SERVER_CATEGORIES: P2P
          DNS_KEEP_NAMESERVER: "on"
          DOT: "off"
          # Talos v1.12 kernel 6.18 disables CONFIG_NETFILTER_XTABLES_LEGACY,
          # breaking gluetun's iptables test rule cleanup. Cilium network
          # policies provide egress enforcement at the cluster level.
          FIREWALL: "off"
          FIREWALL_OUTBOUND_SUBNETS: "172.18.0.0/16,172.19.0.0/16,192.168.10.0/24"
          HEALTH_SERVER_ADDRESS: "0.0.0.0:9999"
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          capabilities:
            add: [NET_ADMIN, NET_RAW]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9999
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/qbittorrent
          tag: "${qbittorrent_version}"
        env:
          QBT_WEBUI_PORT: "8080"
          QBT_BitTorrent__Session__DefaultSavePath: /media/downloads/complete
          QBT_BitTorrent__Session__TempPath: /media/downloads/incomplete
          QBT_BitTorrent__Session__TempPathEnabled: "true"
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              periodSeconds: 10

service:
  app:
    controller: qbittorrent
    ports:
      http:
        port: 8080
      health:
        port: 9999

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      qbittorrent:
        app:
          - path: /config
  media:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      qbittorrent:
        app:
          - path: /media
  gluetun-data:
    type: emptyDir
    advancedMounts:
      qbittorrent:
        gluetun:
          - path: /tmp/gluetun
        app:
          - path: /tmp/gluetun

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  qbittorrent:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/qbittorrent
          tag: "${qbittorrent_version}"
        env:
          QBT_WEBUI_PORT: "8080"
          QBT_BitTorrent__Session__DefaultSavePath: /media/downloads/complete
          QBT_BitTorrent__Session__TempPath: /media/downloads/incomplete
          QBT_BitTorrent__Session__TempPathEnabled: "true"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/app/version
                port: 8080
              periodSeconds: 10

service:
  app:
    controller: qbittorrent
    ports:
      http:
        port: 8080

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      qbittorrent:
        app:
          - path: /config
  media:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      qbittorrent:
        app:
          - path: /media

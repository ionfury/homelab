---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: cluster-values
    namespace: flux-system
    behavior: create
    files:
      - authelia.yaml
      - bazarr.yaml
      - excalidraw.yaml
      - exportarr.yaml
      - factorio.yaml
      - homepage.yaml
      - immich.yaml
      - jellyfin-exporter.yaml
      - jellyfin.yaml
      - jellyseerr.yaml
      - lldap.yaml
      - minecraft.yaml
      - ollama.yaml
      - open-webui.yaml
      - paperless.yaml
      - prowlarr.yaml
      - pxe-boot.yaml
      - qbittorrent.yaml
      - radarr.yaml
      - recyclarr.yaml
      - satisfactory.yaml
      - sonarr.yaml
      - tandoor.yaml
      - tdarr-node.yaml
      - tdarr.yaml
      - valheim.yaml
      - vaultwarden.yaml
      - zipline.yaml

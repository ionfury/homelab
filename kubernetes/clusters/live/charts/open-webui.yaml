---
# Open WebUI Helm chart values
# Chart docs: https://github.com/open-webui/helm-charts

ollama:
  enabled: false

ollamaUrls:
  - "http://ollama.ai.svc.cluster.local:11434"

pipelines:
  enabled: false

# websocket.enabled=false prevents the chart from generating REDIS_URL and
# WEBSOCKET_MANAGER env vars at fixed positions that precede DRAGONFLY_PASS
# from extraEnvVars — causing $(DRAGONFLY_PASS) to resolve as a literal string.
# We provide all websocket env vars ourselves in extraEnvVars where ordering is
# controlled (same pattern as databaseUrl: "" below).
websocket:
  enabled: false
  redis:
    enabled: false

# Database: init container creates DB on shared CNPG cluster (Authelia pattern)
databaseUrl: ""

extraEnvVars:
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: open-webui-db-credentials
        key: password
  - name: DATABASE_URL
    value: "postgresql://open-webui:$(DB_PASSWORD)@platform-pooler-rw.database.svc.cluster.local:5432/open-webui"
  - name: ENABLE_WEBSOCKET_SUPPORT
    value: "True"
  - name: WEBSOCKET_MANAGER
    value: "redis"
  - name: DRAGONFLY_PASS
    valueFrom:
      secretKeyRef:
        name: dragonfly-password
        key: password
  - name: REDIS_URL
    value: "redis://:$(DRAGONFLY_PASS)@dragonfly.cache.svc.cluster.local:6379/0"
  - name: WEBSOCKET_REDIS_URL
    value: "redis://:$(DRAGONFLY_PASS)@dragonfly.cache.svc.cluster.local:6379/1"
  - name: WEBUI_URL
    value: "https://ai.${internal_domain}"
  - name: ENABLE_SIGNUP
    value: "false"
  - name: DEFAULT_USER_ROLE
    value: "user"
  - name: ENABLE_OPENAI_API
    value: "false"

sso:
  enabled: true
  enableSignup: true
  oidc:
    enabled: true
    clientId: open-webui
    clientExistingSecret: open-webui-oidc-client-secret
    clientExistingSecretKey: client-secret
    providerUrl: "https://auth.${internal_domain}/.well-known/openid-configuration"
    providerName: Homelab
    scopes: "openid email profile groups"

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

persistence:
  enabled: true
  size: 5Gi
  storageClass: fast

ingress:
  enabled: false

replicaCount: 1

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 20

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health/db
    port: http
  periodSeconds: 10

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  tandoor:
    type: deployment
    replicas: 2
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/tandoorrecipes/recipes
          tag: ${tandoor_version}
        env:
          # Server configuration
          TANDOOR_PORT: "8080"
          ENABLE_METRICS: "1"
          ENABLE_SIGNUP: "0"
          TZ: UTC
          # Database — shared platform CNPG cluster via postgres-init
          DB_ENGINE: django.db.backends.postgresql
          POSTGRES_HOST: platform-pooler-rw.database.svc.cluster.local
          POSTGRES_PORT: "5432"
          POSTGRES_DB: tandoor
          POSTGRES_USER: tandoor
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: tandoor-db-credentials
                key: password
          # Django SECRET_KEY — auto-generated by secret-generator
          SECRET_KEY:
            valueFrom:
              secretKeyRef:
                name: tandoor-secret
                key: SECRET_KEY
          # S3 media storage via Garage
          S3_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: tandoor-s3-credentials
                key: access-key-id
          S3_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: tandoor-s3-credentials
                key: secret-access-key
          S3_BUCKET_NAME: tandoor
          S3_REGION_NAME: garage
          S3_ENDPOINT_URL: http://${garage_s3_endpoint}
          S3_QUERYSTRING_AUTH: "1"
          S3_CUSTOM_DOMAIN: ""
          # Django security
          ALLOWED_HOSTS:
            value: "recipes.${internal_domain},recipes.${external_domain}"
          CSRF_TRUSTED_ORIGINS:
            value: "https://recipes.${internal_domain},https://recipes.${external_domain}"
          # Gunicorn settings
          GUNICORN_WORKERS: "3"
          GUNICORN_THREADS: "2"
          GUNICORN_MEDIA: "0"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /accounts/login/
                port: 8080
                # Django validates the Host header against ALLOWED_HOSTS.
                # Kubernetes probes send the pod IP as Host, which Django
                # rejects with DisallowedHost.
                httpHeaders:
                  - name: Host
                    value: "recipes.${internal_domain}"
              initialDelaySeconds: 15
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /accounts/login/
                port: 8080
                httpHeaders:
                  - name: Host
                    value: "recipes.${internal_domain}"
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /accounts/login/
                port: 8080
                httpHeaders:
                  - name: Host
                    value: "recipes.${internal_domain}"
              periodSeconds: 10

service:
  app:
    controller: tandoor
    ports:
      http:
        port: 8080

serviceMonitor:
  main:
    enabled: true
    serviceName: app
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 60s

persistence:
  # Writable temp directories for Django (collectstatic, cache)
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  static:
    type: emptyDir
    globalMounts:
      - path: /opt/recipes/staticfiles
  django-js-reverse:
    type: emptyDir
    globalMounts:
      - path: /opt/recipes/cookbook/static/django_js_reverse

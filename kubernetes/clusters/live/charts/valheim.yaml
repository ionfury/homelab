---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  valheim:
    type: statefulset
    replicas: 1

    pod:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/lloesche/valheim-server
          # renovate: datasource=docker depName=ghcr.io/lloesche/valheim-server
          tag: latest
        env:
          # Server configuration
          SERVER_NAME: "Valheim Dedicated"
          SERVER_PUBLIC: "0"
          WORLD_NAME: "Dedicated"
          # Credentials — auto-generated by secret-generator
          SERVER_PASS:
            valueFrom:
              secretKeyRef:
                name: valheim-server-password
                key: password
          # Container user mapping (drops root privileges internally)
          PUID: "1000"
          PGID: "1000"
          # Health check endpoint
          STATUS_HTTP: "true"
          STATUS_HTTP_PORT: "8080"
          # Built-in backup configuration
          BACKUPS: "true"
          BACKUPS_DIRECTORY: /config/backups
          BACKUPS_MAX_AGE: "7"
          BACKUPS_MAX_COUNT: "10"
          BACKUPS_IF_IDLE: "true"
          BACKUPS_IDLE_GRACE_PERIOD: "3600"
        resources:
          requests:
            cpu: "4"
            memory: 6Gi
          limits:
            memory: 6Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status.json
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 10
              failureThreshold: 90
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status.json
                port: 8080
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status.json
                port: 8080
              periodSeconds: 10

service:
  game:
    controller: valheim
    type: LoadBalancer
    ports:
      gameplay:
        port: 2456
        protocol: UDP
      query:
        port: 2457
        protocol: UDP

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: fast
    advancedMounts:
      valheim:
        app:
          - path: /config

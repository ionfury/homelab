---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
defaultPodOptions:
  securityContext:
    seccompProfile:
      type: RuntimeDefault

serviceAccount:
  homepage:
    enabled: true

controllers:
  homepage:
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    strategy: RollingUpdate
    replicas: 2

    containers:
      app:
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: "${homepage_version}"
        env:
          HOMEPAGE_ALLOWED_HOSTS: "home.${internal_domain}"
          LOG_TARGETS: stdout
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 2Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: "home.${internal_domain}"
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: "home.${internal_domain}"
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: "home.${internal_domain}"
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 10

service:
  app:
    controller: homepage
    ports:
      http:
        port: 3000

configMaps:
  config:
    data:
      providers.yaml: |
        longhorn:
          url: http://longhorn-frontend.longhorn-system.svc:80
      kubernetes.yaml: |
        mode: cluster
        gateway: true
      settings.yaml: |
        title: Homelab
        theme: dark
        color: slate
        headerStyle: clean
        statusStyle: dot
        hideVersion: true
        layout:
          - Media:
              icon: mdi-multimedia
              style: row
              columns: 4
          - Apps:
              icon: mdi-apps
              style: row
              columns: 3
          - Platform:
              icon: mdi-server
              style: row
              columns: 4
          - Gaming:
              icon: mdi-gamepad-variant
              style: row
              columns: 2
      widgets.yaml: |
        - search:
            provider: google
            focus: true
            target: _blank
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: live
            nodes:
              show: false
        - openmeteo:
            timezone: America/New_York
            units: imperial
            cache: 15
      services.yaml: |
        - Gaming:
            - Minecraft:
                icon: minecraft.svg
                description: Java + Bedrock crossplay
                widget:
                  type: gamedig
                  serverType: minecraft
                  host: minecraft.minecraft.svc.cluster.local
                  port: 25565
            - Valheim:
                icon: valheim.svg
                description: Dedicated server
                widget:
                  type: gamedig
                  serverType: valheim
                  host: valheim.valheim.svc.cluster.local
                  port: 2457
            - Satisfactory:
                icon: satisfactory.svg
                description: Dedicated server
                widget:
                  type: gamedig
                  serverType: satisfactory
                  host: satisfactory.satisfactory.svc.cluster.local
                  port: 7777
            - Factorio:
                icon: factorio.svg
                description: Space Age
                widget:
                  type: gamedig
                  serverType: factorio
                  host: factorio.factorio.svc.cluster.local
                  port: 34197
      bookmarks.yaml: |
        - Infrastructure:
            - GitHub:
                - icon: github.svg
                  href: https://github.com/thomasnowak/homelab
            - AWS Console:
                - icon: aws.svg
                  href: https://console.aws.amazon.com
            - Cloudflare:
                - icon: cloudflare.svg
                  href: https://dash.cloudflare.com
            - Healthchecks.io:
                - icon: healthchecks.svg
                  href: https://healthchecks.io
      docker.yaml: ""
      proxmox.yaml: ""
      custom.css: |
        #information-widgets .information-widget-resource .resource-value {
          font-size: 0.85rem;
        }
        .service-card {
          padding: 0.5rem !important;
        }
        .services-group .service .status-indicator {
          opacity: 0.4;
          transition: opacity 0.2s ease;
        }
        .services-group .service:hover .status-indicator {
          opacity: 1;
        }
      custom.js: ""

route:
  internal:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Home"
      gethomepage.dev/group: "Platform"
      gethomepage.dev/icon: "homepage.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=homepage"
    parentRefs:
      - name: internal
        namespace: istio-gateway
    hostnames:
      - "home.${internal_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 3000

persistence:
  config:
    type: configMap
    name: homepage
    globalMounts:
      - path: /app/config
  logs:
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

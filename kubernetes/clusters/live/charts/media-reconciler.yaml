---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  media-reconciler:
    type: cronjob
    cronjob:
      schedule: "0 2 * * *"
      successfulJobsHistory: 3
      failedJobsHistory: 3
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    containers:
      app:
        image:
          repository: docker.io/python
          tag: "3.12-alpine"
        command: ["python", "/scripts/reconciler.py"]
        env:
          SONARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: sonarr-api-key
                key: api-key
          SONARR4K_API_KEY:
            valueFrom:
              secretKeyRef:
                name: sonarr4k-api-key
                key: api-key
          RADARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: radarr-api-key
                key: api-key
          RADARR4K_API_KEY:
            valueFrom:
              secretKeyRef:
                name: radarr4k-api-key
                key: api-key
          JELLYSEERR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: jellyseerr-api-key
                key: api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi

persistence:
  scripts:
    type: configMap
    name: media-reconciler-config
    advancedMounts:
      media-reconciler:
        app:
          - path: /scripts
  tmp:
    type: emptyDir
    advancedMounts:
      media-reconciler:
        app:
          - path: /tmp

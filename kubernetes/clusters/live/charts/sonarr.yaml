---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  sonarr:
    type: deployment

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    initContainers:
      init-db-main:
        image:
          repository: ghcr.io/home-operations/postgres-init
          # renovate: datasource=docker depName=ghcr.io/home-operations/postgres-init
          tag: "18"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        env:
          INIT_POSTGRES_HOST: platform-rw.database.svc.cluster.local
          INIT_POSTGRES_SUPER_USER: postgres
          INIT_POSTGRES_SUPER_PASS:
            valueFrom:
              secretKeyRef:
                name: cnpg-superuser-replica
                key: password
          INIT_POSTGRES_USER: sonarr
          INIT_POSTGRES_PASS:
            valueFrom:
              secretKeyRef:
                name: sonarr-db-credentials
                key: password
          INIT_POSTGRES_DBNAME: sonarr-main

      init-db-log:
        dependsOn: init-db-main
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: "18"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        env:
          INIT_POSTGRES_HOST: platform-rw.database.svc.cluster.local
          INIT_POSTGRES_SUPER_USER: postgres
          INIT_POSTGRES_SUPER_PASS:
            valueFrom:
              secretKeyRef:
                name: cnpg-superuser-replica
                key: password
          INIT_POSTGRES_USER: sonarr
          INIT_POSTGRES_PASS:
            valueFrom:
              secretKeyRef:
                name: sonarr-db-credentials
                key: password
          INIT_POSTGRES_DBNAME: sonarr-log

      schema-grants:
        dependsOn: init-db-log
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: "18"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        command: ["psql"]
        args:
          - --host=platform-rw.database.svc.cluster.local
          - --username=postgres
          - --dbname=sonarr-main
          - --command=GRANT ALL ON SCHEMA public TO sonarr; ALTER DATABASE "sonarr-main" OWNER TO sonarr; ALTER DATABASE "sonarr-log" OWNER TO sonarr;
        env:
          PGPASSWORD:
            valueFrom:
              secretKeyRef:
                name: cnpg-superuser-replica
                key: password

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/sonarr
          tag: "${sonarr_version}"
        env:
          SONARR__POSTGRES__HOST: platform-rw.database.svc.cluster.local
          SONARR__POSTGRES__PORT: "5432"
          SONARR__POSTGRES__USER: sonarr
          SONARR__POSTGRES__PASSWORD:
            valueFrom:
              secretKeyRef:
                name: sonarr-db-credentials
                key: password
          SONARR__POSTGRES__MAINDB: sonarr-main
          SONARR__POSTGRES__LOGDB: sonarr-log
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              periodSeconds: 10

service:
  app:
    controller: sonarr
    ports:
      http:
        port: 8989

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      sonarr:
        app:
          - path: /config
  media-downloads:
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      sonarr:
        app:
          - path: /media/downloads
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      sonarr:
        app:
          - path: /media/library

---
# Authelia v0.10.x chart values
# Chart docs: https://www.authelia.com/integration/kubernetes/introduction/
pod:
  kind: Deployment
  replicas: 2
  annotations:
    reloader.stakater.com/auto: "true"
  env:
    - name: SMTP_SENDER
      valueFrom:
        secretKeyRef:
          name: authelia-smtp-credentials
          key: sender
    - name: SMTP_USERNAME
      valueFrom:
        secretKeyRef:
          name: authelia-smtp-credentials
          key: username
  extraVolumeMounts:
    - name: oidc-jwk
      mountPath: /secrets/oidc-jwk
      readOnly: true
  extraVolumes:
    - name: oidc-jwk
      secret:
        secretName: authelia-oidc-jwk
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: [ ALL ]
configMap:
  theme: dark

  totp:
    disable: false
    issuer: homelab
    algorithm: SHA1
    digits: 6
    period: 30

  webauthn:
    disable: false
    enable_passkey_login: true
    display_name: Homelab

  authentication_backend:
    password_reset:
      disable: false
    ldap:
      enabled: true
      implementation: custom
      address: ldap://lldap.authelia.svc.cluster.local:3890
      base_dn: dc=homelab,dc=local
      additional_users_dn: ou=people
      users_filter: "(&(|({username_attribute}={input})({email_attribute}={input}))(o\
        bjectClass=person))"
      additional_groups_dn: ou=groups
      groups_filter: "(member={dn})"
      attributes:
        distinguished_name: ""
        username: uid
        display_name: displayName
        mail: mail
        member_of: memberOf
        group_name: cn
      user: uid=admin,ou=people,dc=homelab,dc=local
      password:
        secret_name: lldap-secrets
        path: LLDAP_LDAP_USER_PASS

  access_control:
    default_policy: two_factor

  session:
    cookies:
      - domain: "${internal_domain}"
        subdomain: auth
      - domain: "${external_domain}"
        subdomain: auth
    redis:
      enabled: true
      host: dragonfly.cache.svc.cluster.local
      port: 6379
      password:
        secret_name: dragonfly-auth
        path: password

  storage:
    postgres:
      enabled: true
      address: tcp://platform-pooler-rw.database.svc.cluster.local:5432
      database: authelia
      username: authelia
      password:
        secret_name: authelia-db-credentials
        path: password

  notifier:
    smtp:
      enabled: true
      address: submissions://smtp.gmail.com:465
      sender: "{{ env \"SMTP_SENDER\" }}"
      username: "{{ env \"SMTP_USERNAME\" }}"
      password:
        secret_name: authelia-smtp-credentials
        path: password

  telemetry:
    metrics:
      enabled: true
      port: 9959
      serviceMonitor:
        enabled: true

  identity_providers:
    oidc:
      enabled: true
      jwks:
        - key:
            path: /secrets/oidc-jwk/tls.key
      cors:
        endpoints:
          - authorization
          - token
          - revocation
          - introspection
          - userinfo
      claims_policies:
        grafana:
          id_token:
            - email
            - name
            - groups
            - preferred_username
      authorization_policies:
        photos:
          default_policy: deny
          rules:
            - policy: two_factor
              subject:
                - "group:photos"
      clients:
        - client_id: "immich"
          client_name: Immich
          client_secret:
            path: /secrets/immich-oidc-client-secret/client-secret
          public: false
          authorization_policy: photos
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - https://photos.${external_domain}/auth/login
            - https://photos.${external_domain}/user-settings
            - app.immich:///oauth-callback
          scopes:
            - openid
            - profile
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
          access_token_signed_response_alg: none
          userinfo_signed_response_alg: none
          token_endpoint_auth_method: client_secret_post
        - client_id: grafana
          client_name: Grafana
          client_secret:
            path: /secrets/grafana-oidc-client-secret/client-secret
          public: false
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - https://grafana.${internal_domain}/login/generic_oauth
          scopes:
            - openid
            - profile
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
          token_endpoint_auth_method: client_secret_basic
          claims_policy: grafana
        - client_id: open-webui
          client_name: Open WebUI
          client_secret:
            path: /secrets/open-webui-oidc-client-secret/client-secret
          public: false
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - https://ai.${internal_domain}/oauth/oidc/callback
          scopes:
            - openid
            - profile
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
          token_endpoint_auth_method: client_secret_basic
        - client_id: zipline
          client_name: Zipline
          client_secret:
            path: /secrets/zipline-oidc-client-secret/client-secret
          public: false
          authorization_policy: two_factor
          require_pkce: false
          consent_mode: implicit
          pkce_challenge_method: S256
          redirect_uris:
            - https://upload.${external_domain}/api/auth/oauth/oidc
          scopes:
            - openid
            - profile
            - email
            - offline_access
          response_types:
            - code
          grant_types:
            - authorization_code
            - refresh_token
          token_endpoint_auth_method: client_secret_post

  regulation:
    max_retries: 3
    ban_time: 5m
    find_time: 2m

  server:
    endpoints:
      automatic_authz_implementations:
        - ForwardAuth

secret:
  existingSecret: "authelia-secrets"
  additionalSecrets:
    lldap-secrets: {}
    authelia-db-credentials: {}
    dragonfly-auth: {}
    grafana-oidc-client-secret: {}
    open-webui-oidc-client-secret: {}
    immich-oidc-client-secret: {}
    zipline-oidc-client-secret: {}
    authelia-smtp-credentials: {}

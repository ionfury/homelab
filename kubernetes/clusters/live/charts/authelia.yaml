---
# Authelia v0.10.x chart values
# Chart docs: https://www.authelia.com/integration/kubernetes/introduction/
pod:
  kind: Deployment
  replicas: 2
  annotations:
    reloader.stakater.com/auto: "true"
  extraVolumeMounts:
    - name: oidc-jwk
      mountPath: /secrets/oidc-jwk
      readOnly: true
    - name: notification
      mountPath: /config
  extraVolumes:
    - name: oidc-jwk
      secret:
        secretName: authelia-oidc-jwk
    - name: notification
      emptyDir: { }
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: [ALL]
  initContainers:
    - name: init-db
      # renovate: datasource=docker depName=ghcr.io/home-operations/postgres-init
      image: ghcr.io/home-operations/postgres-init:18
      env:
        - name: INIT_POSTGRES_HOST
          value: platform-rw.database.svc.cluster.local
        - name: INIT_POSTGRES_SUPER_USER
          value: postgres
        - name: INIT_POSTGRES_SUPER_PASS
          valueFrom:
            secretKeyRef:
              name: cnpg-superuser-replica
              key: password
        - name: INIT_POSTGRES_USER
          value: authelia
        - name: INIT_POSTGRES_PASS
          valueFrom:
            secretKeyRef:
              name: authelia-db-credentials
              key: password
        - name: INIT_POSTGRES_DBNAME
          value: authelia
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
    - name: schema-grants
      # renovate: datasource=docker depName=ghcr.io/home-operations/postgres-init
      image: ghcr.io/home-operations/postgres-init:18
      command: ["psql"]
      args:
        - --host=platform-rw.database.svc.cluster.local
        - --username=postgres
        - --dbname=authelia
        - --command=GRANT ALL ON SCHEMA public TO authelia; ALTER DATABASE authelia OWNER TO authelia; GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO authelia; GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO authelia;
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: cnpg-superuser-replica
              key: password
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]

configMap:
  theme: dark

  totp:
    disable: false
    issuer: homelab
    algorithm: SHA1
    digits: 6
    period: 30

  webauthn:
    disable: false
    enable_passkey_login: true
    display_name: Homelab

  authentication_backend:
    password_reset:
      disable: false
    ldap:
      enabled: true
      implementation: custom
      address: ldap://lldap.authelia.svc.cluster.local:3890
      base_dn: dc=homelab,dc=local
      additional_users_dn: ou=people
      users_filter: "(&(|({username_attribute}={input})({email_attribute}={input}))(objectClass=person))"
      additional_groups_dn: ou=groups
      groups_filter: "(member={dn})"
      attributes:
        distinguished_name: ""
        username: uid
        display_name: displayName
        mail: mail
        member_of: memberOf
        group_name: cn
      user: uid=admin,ou=people,dc=homelab,dc=local
      password:
        secret_name: lldap-secrets
        path: LLDAP_LDAP_USER_PASS

  access_control:
    default_policy: two_factor

  session:
    cookies:
      - domain: "${internal_domain}"
        subdomain: auth
      - domain: "${external_domain}"
        subdomain: auth
    redis:
      enabled: true
      host: dragonfly.cache.svc.cluster.local
      port: 6379
      password:
        secret_name: dragonfly-password
        path: password

  storage:
    postgres:
      enabled: true
      address: tcp://platform-pooler-rw.database.svc.cluster.local:5432
      database: authelia
      username: authelia
      password:
        secret_name: authelia-db-credentials
        path: password

  notifier:
    filesystem:
      enabled: true
      filename: /config/notification.txt

  telemetry:
    metrics:
      enabled: true
      port: 9959
      serviceMonitor:
        enabled: true

  identity_providers:
    oidc:
      enabled: true
      jwks:
        - key:
            path: /secrets/oidc-jwk/tls.key
      cors:
        endpoints:
          - authorization
          - token
          - revocation
          - introspection
          - userinfo
      claims_policies:
        grafana:
          id_token:
            - email
            - name
            - groups
            - preferred_username
      clients:
        - client_id: grafana
          client_name: Grafana
          client_secret:
            path: /secrets/grafana-oidc-client-secret/client-secret
          public: false
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - https://grafana.${internal_domain}/login/generic_oauth
          scopes:
            - openid
            - profile
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
          token_endpoint_auth_method: client_secret_basic
          claims_policy: grafana

  regulation:
    max_retries: 3
    ban_time: 5m
    find_time: 2m

  server:
    endpoints:
      automatic_authz_implementations:
        - ForwardAuth

secret:
  existingSecret: ''
  additionalSecrets:
    lldap-secrets: { }
    cnpg-superuser-replica: { }
    authelia-db-credentials: { }
    dragonfly-password: { }
    grafana-oidc-client-secret: { }

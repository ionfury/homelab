---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  jellyfin:
    type: deployment

    pod:
      # TEMPORARY WORKAROUND for istio/istio#60074 (+ #60767): the external
      # gateway's ambient connect_originate HTTP/2 pool leaks HBONE streams to
      # Jellyfin and never closes them, wedging playback after client-aborted
      # Range requests (Infuse seeking/buffering). No config-level fix exists
      # upstream and only a gateway restart clears it. Opting Jellyfin out of
      # ambient makes the gateway route directly to the pod (plain cluster, no
      # HBONE), sidestepping the leak. Cost: no ambient mTLS on the
      # gateway->Jellyfin hop. Jellyfin is public, gateway-TLS-terminated, and
      # self-authenticating, and no AuthorizationPolicy targets its workload.
      # REMOVE this label once #60074 is fixed and the fix is deployed.
      labels:
        istio.io/dataplane-mode: none
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: jellyfin/jellyfin
          tag: "${jellyfin_version}"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 4
            memory: 512Mi
          limits:
            memory: 16Gi
            nvidia.com/gpu: 1
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 60
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              periodSeconds: 10

service:
  app:
    controller: jellyfin
    ports:
      http:
        port: 8096

route:
  external:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Jellyfin"
      gethomepage.dev/group: "Media"
      gethomepage.dev/icon: "jellyfin.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=jellyfin"
    parentRefs:
      - name: external
        namespace: istio-gateway
    hostnames:
      - "watch.${external_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 8096

persistence:
  cache:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClass: fast
    advancedMounts:
      jellyfin:
        app:
          - path: /cache
  transcodes:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 200Gi
    storageClass: fast-ephemeral
    advancedMounts:
      jellyfin:
        app:
          - path: /transcodes
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClass: fast
    advancedMounts:
      jellyfin:
        app:
          - path: /config
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library

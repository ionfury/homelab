---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  jellyfin:
    type: deployment

    pod:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: jellyfin/jellyfin
          tag: "${jellyfin_version}"
        env:
          ParallelLibraryScanLimit: "3"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 4
            memory: 512Mi
          limits:
            memory: 16Gi
            nvidia.com/gpu: 1
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 60
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              periodSeconds: 10

service:
  app:
    controller: jellyfin
    ports:
      http:
        port: 8096

route:
  external:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Jellyfin"
      gethomepage.dev/group: "Media"
      gethomepage.dev/icon: "jellyfin.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=jellyfin"
    parentRefs:
      - name: external
        namespace: istio-gateway
    hostnames:
      - "watch.${external_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 8096

persistence:
  cache:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClass: fast
    advancedMounts:
      jellyfin:
        app:
          - path: /cache
  transcodes:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 200Gi
    storageClass: fast-ephemeral
    advancedMounts:
      jellyfin:
        app:
          - path: /transcodes
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClass: fast
    advancedMounts:
      jellyfin:
        app:
          - path: /config
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-00
  media-library-01:
    type: persistentVolumeClaim
    existingClaim: media-library-01
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-01
  media-library-02:
    type: persistentVolumeClaim
    existingClaim: media-library-02
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-02
  media-library-03:
    type: persistentVolumeClaim
    existingClaim: media-library-03
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-03
  media-library-04:
    type: persistentVolumeClaim
    existingClaim: media-library-04
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-04
  media-library-05:
    type: persistentVolumeClaim
    existingClaim: media-library-05
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-05
  media-library-06:
    type: persistentVolumeClaim
    existingClaim: media-library-06
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-06
  media-library-07:
    type: persistentVolumeClaim
    existingClaim: media-library-07
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-07
  media-library-08:
    type: persistentVolumeClaim
    existingClaim: media-library-08
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-08
  media-library-09:
    type: persistentVolumeClaim
    existingClaim: media-library-09
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-09
  media-library-10:
    type: persistentVolumeClaim
    existingClaim: media-library-10
    advancedMounts:
      jellyfin:
        app:
          - path: /media/library/disk-10

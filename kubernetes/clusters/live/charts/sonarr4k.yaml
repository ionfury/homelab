---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  sonarr4k:
    type: deployment

    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/sonarr
          tag: "${sonarr4k_version}"
        env:
          SONARR__POSTGRES__HOST: platform-rw.database.svc.cluster.local
          SONARR__POSTGRES__PORT: "5432"
          SONARR__POSTGRES__USER: sonarr4k
          SONARR__POSTGRES__PASSWORD:
            valueFrom:
              secretKeyRef:
                name: sonarr4k-db-credentials
                key: password
          SONARR__POSTGRES__MAINDB: sonarr4k-main
          SONARR__POSTGRES__LOGDB: sonarr4k-log
          SONARR__AUTH__METHOD: External
          SONARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: sonarr4k-api-key
                key: api-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 4Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8989
              periodSeconds: 10

service:
  app:
    controller: sonarr4k
    ports:
      http:
        port: 8989

route:
  internal:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Sonarr 4K"
      gethomepage.dev/group: "Media"
      gethomepage.dev/icon: "sonarr.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=sonarr4k"
    parentRefs:
      - name: internal
        namespace: istio-gateway
    hostnames:
      - "sonarr4k.${internal_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 8989

persistence:
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 1Gi
    advancedMounts:
      sonarr4k:
        app:
          - path: /tmp
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      sonarr4k:
        app:
          - path: /config
  sabnzbd-downloads:
    type: persistentVolumeClaim
    existingClaim: sabnzbd-downloads
    advancedMounts:
      sonarr4k:
        app:
          - path: /downloads/sabnzbd
  qbittorrent-downloads:
    type: persistentVolumeClaim
    existingClaim: qbittorrent-downloads
    advancedMounts:
      sonarr4k:
        app:
          - path: /downloads/qbittorrent
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-00
  media-library-01:
    type: persistentVolumeClaim
    existingClaim: media-library-01
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-01
  media-library-02:
    type: persistentVolumeClaim
    existingClaim: media-library-02
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-02
  media-library-03:
    type: persistentVolumeClaim
    existingClaim: media-library-03
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-03
  media-library-04:
    type: persistentVolumeClaim
    existingClaim: media-library-04
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-04
  media-library-05:
    type: persistentVolumeClaim
    existingClaim: media-library-05
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-05
  media-library-06:
    type: persistentVolumeClaim
    existingClaim: media-library-06
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-06
  media-library-07:
    type: persistentVolumeClaim
    existingClaim: media-library-07
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-07
  media-library-08:
    type: persistentVolumeClaim
    existingClaim: media-library-08
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-08
  media-library-09:
    type: persistentVolumeClaim
    existingClaim: media-library-09
    advancedMounts:
      sonarr4k:
        app:
          - path: /media/library/disk-09
  media-library-10:
    type: persistentVolumeClaim
    existingClaim: media-library-10
    advancedMounts:

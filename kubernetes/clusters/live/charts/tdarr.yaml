---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  tdarr:
    type: deployment

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    # s6-overlay (LinuxServer.io) requires root to run its init system,
    # then drops to PUID/PGID via s6-applyuidgid. Capabilities needed:
    # SETUID/SETGID for user switching, CHOWN/DAC_OVERRIDE/FOWNER for
    # file ownership fixups during init.
    containers:
      app:
        image:
          repository: ghcr.io/haveagitgat/tdarr
          tag: "${tdarr_version}"
        env:
          TZ: UTC
          PUID: "568"
          PGID: "568"
          serverIP: "0.0.0.0"
          serverPort: "8266"
          webUIPort: "8265"
          internalNode: "false"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop: [ALL]
            add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              periodSeconds: 10

service:
  app:
    controller: tdarr
    ports:
      http:
        port: 8265
      server:
        port: 8266

route:
  internal:
    enabled: true
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Tdarr"
      gethomepage.dev/group: "Media"
      gethomepage.dev/icon: "tdarr.svg"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=tdarr"
    parentRefs:
      - name: internal
        namespace: istio-gateway
    hostnames:
      - "tdarr.${internal_domain}"
    rules:
      - backendRefs:
          - identifier: app
            port: 8265

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      tdarr:
        app:
          - path: /app/configs
  server:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: fast
    advancedMounts:
      tdarr:
        app:
          - path: /app/server
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-00
            readOnly: false
  media-library-01:
    type: persistentVolumeClaim
    existingClaim: media-library-01
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-01
  media-library-02:
    type: persistentVolumeClaim
    existingClaim: media-library-02
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-02
  media-library-03:
    type: persistentVolumeClaim
    existingClaim: media-library-03
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-03
  media-library-04:
    type: persistentVolumeClaim
    existingClaim: media-library-04
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-04
  media-library-05:
    type: persistentVolumeClaim
    existingClaim: media-library-05
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-05
  media-library-06:
    type: persistentVolumeClaim
    existingClaim: media-library-06
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-06
  media-library-07:
    type: persistentVolumeClaim
    existingClaim: media-library-07
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-07
  media-library-08:
    type: persistentVolumeClaim
    existingClaim: media-library-08
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-08
  media-library-09:
    type: persistentVolumeClaim
    existingClaim: media-library-09
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-09
  media-library-10:
    type: persistentVolumeClaim
    existingClaim: media-library-10
    advancedMounts:
      tdarr:
        app:
          - path: /media/library/disk-10
  transcode-cache:
    type: emptyDir
    advancedMounts:
      tdarr:
        app:
          - path: /app/transcode_cache
  run:
    type: emptyDir
    advancedMounts:
      tdarr:
        app:
          - path: /run

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
controllers:
  tdarr:
    type: deployment

    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    # s6-overlay preinit checks that /run is owned by the container UID.
    # emptyDir mount points are always owned by root (uid 0) — Kubernetes
    # only changes the GID via fsGroup, not the UID. This init container
    # runs as root with CAP_CHOWN to fix the ownership before the app starts.
    initContainers:
      init-run:
        image:
          repository: busybox
          tag: latest
        command:
          - /bin/sh
          - -c
          - chown 568:568 /run
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

    containers:
      app:
        image:
          repository: ghcr.io/haveagitgat/tdarr
          tag: "${tdarr_version}"
        env:
          TZ: UTC
          serverIP: "0.0.0.0"
          serverPort: "8266"
          webUIPort: "8265"
          internalNode: "false"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v2/status
                port: 8265
              periodSeconds: 10

service:
  app:
    controller: tdarr
    ports:
      http:
        port: 8265
      server:
        port: 8266

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: fast
    advancedMounts:
      tdarr:
        app:
          - path: /app/configs
  server:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: fast
    advancedMounts:
      tdarr:
        app:
          - path: /app/server
  media-library:
    type: persistentVolumeClaim
    existingClaim: media-library
    advancedMounts:
      tdarr:
        app:
          - path: /media/library
            readOnly: true
  transcode-cache:
    type: emptyDir
    advancedMounts:
      tdarr:
        app:
          - path: /app/transcode_cache
  run:
    type: emptyDir
    globalMounts:
      - path: /run

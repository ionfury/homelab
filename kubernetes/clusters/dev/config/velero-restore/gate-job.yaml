---
apiVersion: batch/v1
kind: Job
metadata:
  name: velero-restore-gate
  namespace: velero
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: velero-restore-gate
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gate
          # renovate: datasource=docker depName=bitnamilegacy/kubectl
          image: docker.io/bitnamilegacy/kubectl:1.33
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # Phase 1: Wait for Velero to discover existing backups from S3.
              # On a fresh deploy, the BackupStorageLocation needs time to sync.
              echo "Phase 1: Waiting for backup discovery..."
              deadline=$((SECONDS + 120))
              while [ $SECONDS -lt $deadline ]; do
                count=$(kubectl get backups.velero.io -n velero --no-headers 2>/dev/null | wc -l)
                if [ "$count" -gt 0 ]; then
                  echo "Found $count backup(s) in BSL."
                  break
                fi
                echo "No backups found yet, waiting... ($((deadline - SECONDS))s remaining)"
                sleep 10
              done

              if [ "$(kubectl get backups.velero.io -n velero --no-headers 2>/dev/null | wc -l)" -eq 0 ]; then
                echo "No backups found after 120s — assuming fresh cluster. Exiting successfully."
                exit 0
              fi

              # Phase 2: Wait for all Restore CRs to reach a terminal state.
              echo "Phase 2: Waiting for Restore CRs to complete..."
              while true; do
                restores=$(kubectl get restores.velero.io -n velero -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}' 2>/dev/null)

                if [ -z "$restores" ]; then
                  echo "No Restore CRs found. Exiting successfully."
                  exit 0
                fi

                pending=0
                while IFS=$'\t' read -r name phase; do
                  case "$phase" in
                    New|InProgress|WaitingForPluginOperations|WaitingForPluginOperationsPartiallyFailed)
                      echo "Restore $name is in non-terminal phase: $phase"
                      pending=$((pending + 1))
                      ;;
                    Failed|PartiallyFailed)
                      echo "WARNING: Restore $name has phase: $phase"
                      ;;
                    Completed)
                      echo "Restore $name completed successfully."
                      ;;
                    *)
                      echo "Restore $name has unknown phase: $phase"
                      pending=$((pending + 1))
                      ;;
                  esac
                done <<< "$restores"

                if [ "$pending" -eq 0 ]; then
                  echo "All Restore CRs have reached terminal state."
                  exit 0
                fi

                echo "Waiting for $pending restore(s) to complete..."
                sleep 15
              done

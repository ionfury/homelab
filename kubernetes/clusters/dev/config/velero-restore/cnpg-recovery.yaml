---
# Partial CNPG Cluster CR for DR recovery on dev.
# Managed by: velero-restore Kustomization (owns spec.bootstrap + spec.externalClusters)
# All other fields managed by: database-config Kustomization (cluster.yaml)
# Flux SSA field merging: no conflict -- no field has two managers.
# CNPG reads spec.bootstrap ONLY on initial cluster creation; subsequent
# database-config reconciliations update managed.roles etc. without re-bootstrapping.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform
  namespace: database
spec:
  bootstrap:
    recovery:
      source: platform-backup
  externalClusters:
    - name: platform-backup
      barmanObjectStore:
        destinationPath: s3://cnpg-platform-backups/
        endpointURL: http://${garage_s3_endpoint}
        s3Credentials:
          accessKeyId:
            name: cnpg-platform-s3-credentials
            key: access-key-id
          secretAccessKey:
            name: cnpg-platform-s3-credentials
            key: secret-access-key
        wal:
          compression: gzip
        data:
          compression: gzip

---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
resources:
  - paperless
configMapGenerator:
  - name: cluster-values
    namespace: flux-system
    behavior: create
    files:
      - paperless.yaml=paperless/values.yaml

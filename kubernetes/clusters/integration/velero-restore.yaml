---
# Skip mode: integration never restores from backup.
# Points to an empty stub so dependsOn resolves immediately.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-restore
  namespace: flux-system
spec:
  interval: 10m
  path: kubernetes/platform/stubs/empty
  prune: false
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system

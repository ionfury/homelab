---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
controllers:
  booter:
    type: daemonset

    containers:
      app:
        image:
          repository: ghcr.io/siderolabs/booter
          tag: "${booter_version}"
        args:
          - --talos-version=${talos_version}
          - --schematic-id=${talos_pxe_schematic_id}
        env:
          - name: BOOTER_NODE_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          capabilities:
            add:
              - NET_BIND_SERVICE
              - NET_RAW

defaultPodOptions:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

service:
  app:
    controller: booter
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: ${booter_ip}
    ports:
      tftp:
        port: 69
        protocol: UDP
      http:
        port: 50084
        protocol: TCP

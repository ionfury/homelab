---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/extensions.istio.io/wasmplugin_v1alpha1.json
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
spec:
  # Target only the external gateway pods
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: external
  # renovate: datasource=docker depName=ghcr.io/corazawaf/coraza-proxy-wasm
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0@sha256:65d6009b9da2e8965e592a08b74a86725435fc01aa39c756dce0bd5ea64b3f4e
  imagePullPolicy: IfNotPresent
  # Run early in filter chain, before authentication
  phase: AUTHN
  # Deny traffic if WAF errors - security over availability
  failStrategy: FAIL_CLOSE
  pluginConfig:
    directives_map:
      default:
        - Include @recommended-conf
        - Include @crs-setup-conf
        - SecAction
          "id:900000,phase:1,pass,t:none,nolog,setvar:tx.blocking_paranoia_level=1"
        - SecAction
          "id:900001,phase:1,pass,t:none,nolog,setvar:'tx.allowed_methods=GET
          HEAD POST OPTIONS PUT PATCH DELETE'"
        - SecAction
          "id:900002,phase:1,pass,t:none,nolog,setvar:tx.inbound_anomaly_score_threshold=10"
        - Include @owasp_crs/*.conf
        - SecRuleEngine On
        - SecRule REQUEST_URI "@beginsWith /api/assets" "id:9000003,phase:1,pass,nolog,ctl:requestBodyAccess=Off"
        - SecRule REQUEST_URI "@beginsWith /api/auth/validateToken" "id:9000004,phase:1,pass,nolog,ctl:ruleRemoveById=920420"
        - SecRequestBodyLimit 10485760
        - SecRequestBodyNoFilesLimit 131072
        - SecResponseBodyAccess Off
    default_directives: default

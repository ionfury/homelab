---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.30.0/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: coraza-rules
  annotations:
    # Istio WasmPlugin doesn't support volume mounts, so rules are inlined in the WasmPlugin.
    # This ConfigMap serves as a documentation artifact and source-of-truth for custom rules.
    # When tuning rules, update both this ConfigMap (for docs) and the WasmPlugin (for runtime).
    note: "Reference copy - actual rules are in WasmPlugin pluginConfig"
data:
  custom-rules.conf: |
    # WasmPlugin includes (for reference):
    # - Include @recommended-conf
    # - Include @crs-setup-conf
    # - Include @owasp_crs/*.conf
    # - SecRuleEngine On
    #
    # Custom rules below tune the CRS behavior:

    # Immich admin config endpoint: OIDC URLs in body cause RFI false positives.
    # SecRule REQUEST_URI "@beginsWith /api/system-config" "id:9000001,..."
    # Zipline server settings endpoint: OIDC URLs in body cause RFI false positives.
    # SecRule REQUEST_URI "@beginsWith /api/server/settings" "id:9000002,..."
    # Immich asset upload: Coraza WASM memory limit causes multipart EOF on photo uploads
    # (rule 200002 blocks with "MULTIPART: unexpected EOF"). Skip body inspection entirely.
    SecRule REQUEST_URI "@beginsWith /api/assets" "id:9000003,phase:1,pass,nolog,ctl:requestBodyAccess=Off"
    # Immich iOS app sends text/plain to /api/auth/validateToken — rule 920420 false positive.
    SecRule REQUEST_URI "@beginsWith /api/auth/validateToken" "id:9000004,phase:1,pass,nolog,ctl:ruleRemoveById=920420"

    # Allow full REST method set (CRS default omits PUT/PATCH/DELETE).
    # Must be after @crs-setup-conf so we override its tx.allowed_methods default.
    SecAction "id:900001,phase:1,pass,t:none,nolog,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

    # Paranoia level 1 (lowest, fewer false positives)
    SecAction "id:900000,phase:1,pass,t:none,nolog,setvar:tx.blocking_paranoia_level=1"

    # Disable specific rules that cause false positives (examples)
    # SecRuleRemoveById 920350  # Host header validation
    # SecRuleRemoveById 942100  # SQL injection detection

    # Request body size limit (10MB)
    SecRequestBodyLimit 10485760
    SecRequestBodyNoFilesLimit 131072

    # Response body inspection disabled (performance)
    SecResponseBodyAccess Off

    # Block Vaultwarden admin panel from external access (hard 403, not a redirect)
    SecRule REQUEST_HEADERS:Host "@contains vault.${external_domain}" "id:9000010,phase:1,chain,deny,status:403,log,msg:'Vaultwarden admin blocked'"
    SecRule REQUEST_URI "@beginsWith /admin" "t:none"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: garage-default
  namespace: garage
spec:
  description: "Allow Garage S3 data plane: API from labeled namespaces, inter-node replication, admin API"
  endpointSelector: { }
  ingress:
    # Allow S3 API from namespaces with garage-s3 access label
    - fromEndpoints:
        - matchExpressions:
            - key: io.cilium.k8s.namespace.labels.access.network-policy.homelab/garage-s3
              operator: In
              values: ["true"]
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # Allow S3 API from platform namespaces that need backups (longhorn, database, cache)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: longhorn-system
        - matchLabels:
            io.kubernetes.pod.namespace: database
        - matchLabels:
            io.kubernetes.pod.namespace: cache
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # Allow inter-node RPC replication
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3901"
              protocol: TCP
    # Allow Prometheus scraping, operator admin API access, and intra-namespace admin
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
        - matchLabels:
            io.kubernetes.pod.namespace: garage
        - matchLabels:
            io.kubernetes.pod.namespace: garage-system
      toPorts:
        - ports:
            - port: "3903"
              protocol: TCP
    # Allow admin API from gateway (optional web UI)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: istio-gateway
      toPorts:
        - ports:
            - port: "3903"
              protocol: TCP
  egress:
    # Allow inter-node RPC replication and intra-namespace admin API calls
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3901"
              protocol: TCP
            - port: "3903"
              protocol: TCP

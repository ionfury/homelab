---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# SNMP exporter config with CyberPower UPS module (cyberpower) and standard
# modules (if_mib, public_v2). Generated by the snmp_exporter generator tool
# with CyberPower MIBs and stored in AWS SSM as a single snmp.yml blob.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: snmp-exporter-config
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: snmp-exporter-config
    template:
      engineVersion: v2
      data:
        snmp.yml: "{{ .config }}"
  data:
    - secretKey: config
      remoteRef:
        key: /homelab/kubernetes/${cluster_name}/snmp-exporter-config

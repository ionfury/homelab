---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-health
  namespace: monitoring
  labels:
    grafana_dashboard: "true"
  annotations:
    grafana_folder: "Backup"
data:
  backup-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 10,
          "title": "Longhorn Backups",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Time since last successful backup per Longhorn volume. Red threshold at 36 hours indicates stale backups that may cause data loss.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "noValue": "No backups",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 86400 },
                  { "color": "red", "value": 129600 }
                ]
              },
              "unit": "s",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Never", "color": "red" }
                  }
                }
              ]
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 1 },
          "id": 11,
          "options": {
            "cellHeight": "sm",
            "footer": { "enablePagination": false, "show": false },
            "showHeader": true,
            "sortBy": [
              { "desc": true, "displayName": "Backup Age" }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "time() - longhorn_volume_last_backup_at",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Longhorn Volume Backup Age",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true
                },
                "renameByName": {
                  "Value": "Backup Age",
                  "volume": "Volume",
                  "pvc": "PVC",
                  "pvc_namespace": "Namespace",
                  "node": "Node"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 20,
          "title": "CNPG PostgreSQL Backups",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Time since last available base backup per CNPG cluster. Above 24h triggers CNPGClusterBackupStale alert.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 86400 },
                  { "color": "red", "value": 172800 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 10 },
          "id": 21,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "time() - cnpg_collector_last_available_backup_timestamp",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "title": "CNPG Last Backup Age",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Count of WAL files waiting for archival per CNPG cluster. Above 10 triggers CNPGWALArchivingLagHigh alert; above 100 triggers CNPGWALArchivingStalled.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 10 },
          "id": 22,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "cnpg_collector_pg_wal_archive_status{value=\"ready\"}",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "title": "CNPG WAL Files Pending Archival",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Age of the earliest point-in-time recovery position per CNPG cluster. Represents the recovery window depth.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 86400 },
                  { "color": "red", "value": 172800 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 10 },
          "id": 23,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "time() - cnpg_collector_first_recoverability_point",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "title": "CNPG First Recoverability Point Age",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "WAL archiving backlog trend over time. Sustained increases indicate archiving pipeline issues.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": {
                  "mode": "dashed",
                  "dashes": { "values": [10, 100] }
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "id": 24,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "cnpg_collector_pg_wal_archive_status{value=\"ready\"}",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "title": "CNPG WAL Archiving Lag Over Time",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["backup", "longhorn", "cnpg", "data-protection"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Backup Health",
      "uid": "backup-health",
      "version": 1
    }

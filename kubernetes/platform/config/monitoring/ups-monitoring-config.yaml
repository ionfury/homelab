---
# CyberPower UPS SNMP exporter configuration.
# Generated from CPS-MIB OID tree (1.3.6.1.4.1.3808.1.1.1).
# Provides the "cyberpower" module for prometheus-snmp-exporter.
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-cyberpower-config
data:
  snmp.yml: |
    auths:
      public_v2:
        community: public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2
    modules:
      cyberpower:
        walk:
        - 1.3.6.1.4.1.3808.1.1.1.1
        - 1.3.6.1.4.1.3808.1.1.1.2
        - 1.3.6.1.4.1.3808.1.1.1.3
        - 1.3.6.1.4.1.3808.1.1.1.4
        - 1.3.6.1.4.1.3808.1.1.1.5
        metrics:
        # -- Identity --
        - name: upsBaseIdentModel
          oid: 1.3.6.1.4.1.3808.1.1.1.1.1.1
          type: DisplayString
          help: UPS model name.
        - name: upsAdvanceIdentFirmwareRevision
          oid: 1.3.6.1.4.1.3808.1.1.1.1.2.1
          type: DisplayString
          help: UPS firmware revision.
        - name: upsAdvanceIdentSerialNumber
          oid: 1.3.6.1.4.1.3808.1.1.1.1.2.3
          type: DisplayString
          help: UPS serial number.
        # -- Battery --
        - name: upsBaseBatteryStatus
          oid: 1.3.6.1.4.1.3808.1.1.1.2.1.1
          type: gauge
          help: Current UPS battery status (1=unknown, 2=batteryNormal, 3=batteryLow).
          enum_values:
            1: unknown
            2: batteryNormal
            3: batteryLow
        - name: upsBaseBatteryTimeOnBattery
          oid: 1.3.6.1.4.1.3808.1.1.1.2.1.2
          type: gauge
          help: Elapsed time since the UPS switched to battery power in timeticks.
        - name: upsAdvanceBatteryCapacity
          oid: 1.3.6.1.4.1.3808.1.1.1.2.2.1
          type: gauge
          help: Remaining battery capacity in percent.
        - name: upsAdvanceBatteryVoltage
          oid: 1.3.6.1.4.1.3808.1.1.1.2.2.2
          type: gauge
          help: Current battery voltage in 0.1V DC.
        - name: upsAdvanceBatteryTemperature
          oid: 1.3.6.1.4.1.3808.1.1.1.2.2.3
          type: gauge
          help: Current internal UPS temperature in Celsius.
        - name: upsAdvanceBatteryRunTimeRemaining
          oid: 1.3.6.1.4.1.3808.1.1.1.2.2.4
          type: gauge
          help: Estimated remaining battery runtime in timeticks.
        - name: upsAdvanceBatteryReplaceIndicator
          oid: 1.3.6.1.4.1.3808.1.1.1.2.2.5
          type: gauge
          help: Whether the battery needs replacement (1=noBatteryNeedsReplacing, 2=batteryNeedsReplacing).
          enum_values:
            1: noBatteryNeedsReplacing
            2: batteryNeedsReplacing
        # -- Input --
        - name: upsBaseInputPhase
          oid: 1.3.6.1.4.1.3808.1.1.1.3.1.1
          type: gauge
          help: Number of input phases.
        - name: upsAdvanceInputLineVoltage
          oid: 1.3.6.1.4.1.3808.1.1.1.3.2.1
          type: gauge
          help: Current input line voltage in 0.1V AC.
        - name: upsAdvanceInputFrequency
          oid: 1.3.6.1.4.1.3808.1.1.1.3.2.4
          type: gauge
          help: Current input line frequency in 0.1 Hz.
        # -- Output --
        - name: upsBaseOutputStatus
          oid: 1.3.6.1.4.1.3808.1.1.1.4.1.1
          type: gauge
          help: Current UPS output status.
          enum_values:
            1: unknown
            2: onLine
            3: onBattery
            4: onBoost
            5: onSleep
            6: off
            7: onRebooting
            8: onECO
            9: onBypass
            10: onBuck
            11: onOverload
            12: onSwitchOutput
            13: onFailed
        - name: upsBaseOutputPhase
          oid: 1.3.6.1.4.1.3808.1.1.1.4.1.2
          type: gauge
          help: Number of output phases.
        - name: upsAdvanceOutputVoltage
          oid: 1.3.6.1.4.1.3808.1.1.1.4.2.1
          type: gauge
          help: Current output voltage in 0.1V AC.
        - name: upsAdvanceOutputFrequency
          oid: 1.3.6.1.4.1.3808.1.1.1.4.2.2
          type: gauge
          help: Current output frequency in 0.1 Hz.
        - name: upsAdvanceOutputLoad
          oid: 1.3.6.1.4.1.3808.1.1.1.4.2.3
          type: gauge
          help: Current UPS output load as a percentage of capacity.
        - name: upsAdvanceOutputCurrent
          oid: 1.3.6.1.4.1.3808.1.1.1.4.2.4
          type: gauge
          help: Current UPS output current in 0.1 amperes.
        - name: upsAdvanceOutputPower
          oid: 1.3.6.1.4.1.3808.1.1.1.4.2.5
          type: gauge
          help: Current UPS output power in watts.
        # -- Configuration --
        - name: upsAdvanceConfigRatedOutputVoltage
          oid: 1.3.6.1.4.1.3808.1.1.1.5.2.1
          type: gauge
          help: Configured output voltage rating.
        - name: upsAdvanceConfigHighTransferVolt
          oid: 1.3.6.1.4.1.3808.1.1.1.5.2.2
          type: gauge
          help: Maximum input voltage before switching to battery.
        - name: upsAdvanceConfigLowTransferVolt
          oid: 1.3.6.1.4.1.3808.1.1.1.5.2.3
          type: gauge
          help: Minimum input voltage before switching to battery.
        - name: upsAdvanceConfigLowBatteryThreshold
          oid: 1.3.6.1.4.1.3808.1.1.1.5.2.18
          type: gauge
          help: Battery capacity percentage that triggers low battery warning.

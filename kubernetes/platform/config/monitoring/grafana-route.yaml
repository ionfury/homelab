---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/group: "Platform"
    gethomepage.dev/icon: "grafana.svg"
    gethomepage.dev/widget.type: "grafana"
    gethomepage.dev/widget.url: "http://grafana.monitoring.svc:80"
    gethomepage.dev/widget.username: "admin"
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_GRAFANA_API_KEY}}"
spec:
  parentRefs:
    - name: internal
      namespace: istio-gateway
  hostnames:
    - "grafana.${internal_domain}"
  rules:
    - backendRefs:
        - name: grafana
          port: 80

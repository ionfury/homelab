---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-restore-gate
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-restore-gate
rules:
  - apiGroups: ["velero.io"]
    resources: ["backups"]
    verbs: ["get", "list"]
  - apiGroups: ["velero.io"]
    resources: ["restores"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-restore-gate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-restore-gate
subjects:
  - kind: ServiceAccount
    name: velero-restore-gate
    namespace: velero

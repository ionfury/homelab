---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-restore-gate
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-restore-gate
rules:
  - apiGroups: ["velero.io"]
    resources: ["backups", "restores"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-restore-gate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-restore-gate
subjects:
  - kind: ServiceAccount
    name: velero-restore-gate
    namespace: velero
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-cnpg-bootstrap
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-cnpg-bootstrap
rules:
  - apiGroups: ["velero.io"]
    resources: ["restores"]
    verbs: ["get"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-cnpg-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-cnpg-bootstrap
subjects:
  - kind: ServiceAccount
    name: velero-cnpg-bootstrap
    namespace: velero

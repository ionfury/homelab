---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: velero-alerts
  labels:
    prometheus: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: velero.rules
      rules:
        - alert: VeleroBackupFailed
          expr: |
            increase(velero_backup_failure_total{schedule!=""}[1h]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Velero backup failed for schedule {{ $labels.schedule }}"
            description: >-
              A Velero backup for schedule {{ $labels.schedule }} has failed.
              Check Velero logs and backup status for details.

        - alert: VeleroBackupPartiallyFailed
          expr: |
            increase(velero_backup_partial_failure_total{schedule!=""}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero backup partially failed for schedule {{ $labels.schedule }}"
            description: >-
              A Velero backup for schedule {{ $labels.schedule }} completed with partial failures.
              Some resources may not have been backed up.

        - alert: VeleroBackupStale
          expr: |
            (time() - velero_backup_last_successful_timestamp{schedule!=""}) > 691200
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Velero backup is stale for schedule {{ $labels.schedule }}"
            description: >-
              No successful backup for schedule {{ $labels.schedule }} in the last 8 days
              (schedules run weekly). Last successful backup was
              {{ $value | humanizeDuration }} ago.

        - alert: VeleroRestoreFailed
          expr: |
            increase(velero_restore_failed_total[1h]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Velero restore failed"
            description: >-
              A Velero restore operation has failed. Check Velero logs and
              restore CR status for details.

        - alert: VeleroRestorePartiallyFailed
          expr: |
            increase(velero_restore_partial_failure_total[1h]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Velero restore partially failed"
            description: >-
              A Velero restore completed with partial failures.
              Some resources may not have been restored.

        - alert: VeleroRestoreStuck
          expr: |
            (
              velero_restore_total
              - velero_restore_success_total
              - velero_restore_failed_total
              - velero_restore_partial_failure_total
              - velero_restore_validation_failed_total
            ) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Velero restore stuck in non-terminal state"
            description: >-
              One or more Velero restores have been in a non-terminal state
              for over 30 minutes. Check velero restore status and logs.

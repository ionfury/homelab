---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-policy
spec:
  # Restrict BGP to control-plane nodes whose IPs are configured as
  # neighbors on the UniFi router. Worker nodes are not in the router's
  # BGP neighbor list, causing idle peering state.
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""
  bgpInstances:
    - name: instance-1
      localASN: ${bgp_cluster_asn}
      peers:
        - name: unifi-router
          peerASN: ${bgp_router_asn}
          peerAddress: ${bgp_router_ip}
          peerConfigRef:
            name: unifi-router

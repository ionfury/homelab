---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn-alerts
  labels:
    prometheus: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: longhorn.rules
      rules:
        # Volume Health - Critical
        - alert: LonghornVolumeStatusCritical
          expr: max by (volume, pvc_namespace) (longhorn_volume_robustness) == 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is faulted"
            description: "Volume {{ $labels.volume }} in namespace {{ $labels.pvc_namespace }} has robustness state 'faulted'. Data may be at risk. Immediate attention required."

        # Volume Health - Warning
        - alert: LonghornVolumeStatusDegraded
          expr: max by (volume, pvc_namespace) (longhorn_volume_robustness) == 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is degraded"
            description: "Volume {{ $labels.volume }} in namespace {{ $labels.pvc_namespace }} has robustness state 'degraded'. Replica count is below desired. Check node health and disk availability."

        # Volume Space - Per Volume
        - alert: LonghornVolumeActualSpaceUsedWarning
          expr: max by (volume, pvc_namespace) (longhorn_volume_actual_size_bytes / longhorn_volume_capacity_bytes) * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} actual space > 90%"
            description: "Volume {{ $labels.volume }} actual used space is {{ $value | printf \"%.1f\" }}% of capacity. Consider expanding the volume or cleaning up data."

        # Node Storage
        - alert: LonghornNodeStorageWarning
          expr: max by (node) (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} storage usage > 70%"
            description: "Node {{ $labels.node }} storage usage is at {{ $value | printf \"%.1f\" }}%. Consider adding capacity or migrating volumes."

        # Disk Storage
        - alert: LonghornDiskStorageWarning
          expr: max by (disk, node) (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) * 100 > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn disk {{ $labels.disk }} storage usage > 70%"
            description: "Disk {{ $labels.disk }} on node {{ $labels.node }} is at {{ $value | printf \"%.1f\" }}% capacity."

        # Node Down - Critical
        - alert: LonghornNodeDown
          expr: (avg(longhorn_node_count_total) or on() vector(0)) - (count(longhorn_node_status{condition="ready"} == 1) or on() vector(0)) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn node(s) offline"
            description: "One or more Longhorn nodes are not ready. This affects volume scheduling and may degrade existing volumes."

        # Instance Manager CPU
        - alert: LonghornInstanceManagerCPUUsageWarning
          expr: max by (instance_manager) (longhorn_instance_manager_cpu_usage_millicpu / longhorn_instance_manager_cpu_requests_millicpu) * 100 > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn instance manager CPU > 300% of request"
            description: "Instance manager {{ $labels.instance_manager }} is consuming {{ $value | printf \"%.0f\" }}% of requested CPU. This may indicate I/O pressure or volume issues."

        # Node CPU
        - alert: LonghornNodeCPUUsageWarning
          expr: max by (node) (longhorn_node_cpu_usage_millicpu / longhorn_node_cpu_capacity_millicpu) * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} CPU > 90%"
            description: "Node {{ $labels.node }} Longhorn CPU usage is at {{ $value | printf \"%.1f\" }}%. High CPU pressure can impact storage performance."

        # Volume Read-Only (filesystem issue)
        - alert: LonghornVolumeReadOnly
          expr: max by (volume, pvc_namespace) (longhorn_volume_file_system_read_only) == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is read-only"
            description: "Volume {{ $labels.volume }} filesystem is in read-only mode. This typically indicates corruption or disk errors. Immediate investigation required."

        # Replica rebuild in progress (informational, longer duration = problem)
        - alert: LonghornRebuildStalled
          expr: max by (volume) (longhorn_engine_rebuild_progress) > 0 and max by (volume) (longhorn_engine_rebuild_progress) < 100
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn replica rebuild stalled on {{ $labels.volume }}"
            description: "Volume {{ $labels.volume }} has been rebuilding for over 30 minutes at {{ $value }}%. This may indicate disk I/O issues or network problems."

        # SSD Endurance - Warning
        - alert: LonghornDiskEnduranceWarning
          expr: max by (disk, node) (longhorn_disk_health_attribute_raw{attribute_id=~"202|231"}) < 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn disk {{ $labels.disk }} on {{ $labels.node }} endurance < 30%"
            description: "Disk {{ $labels.disk }} on node {{ $labels.node }} has {{ $value }}% SSD lifetime remaining. Plan disk replacement."

        # SSD Endurance - Critical
        - alert: LonghornDiskEnduranceCritical
          expr: max by (disk, node) (longhorn_disk_health_attribute_raw{attribute_id=~"202|231"}) < 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn disk {{ $labels.disk }} on {{ $labels.node }} endurance < 10%"
            description: "Disk {{ $labels.disk }} on node {{ $labels.node }} has {{ $value }}% SSD lifetime remaining. Immediate replacement required to prevent data loss."

    # Recording rules that aggregate disk metrics by storage pool (fast/slow)
    # based on disk name patterns from inventory (ssd = fast, hdd = slow).
    - name: longhorn-pool-recording-rules
      rules:
        - record: longhorn:pool_capacity_bytes:sum
          expr: sum(longhorn_disk_capacity_bytes{disk=~".*ssd.*"}) or vector(0)
          labels:
            pool: fast

        - record: longhorn:pool_capacity_bytes:sum
          expr: sum(longhorn_disk_capacity_bytes{disk=~".*hdd.*"}) or vector(0)
          labels:
            pool: slow

        - record: longhorn:pool_usage_bytes:sum
          expr: sum(longhorn_disk_usage_bytes{disk=~".*ssd.*"}) or vector(0)
          labels:
            pool: fast

        - record: longhorn:pool_usage_bytes:sum
          expr: sum(longhorn_disk_usage_bytes{disk=~".*hdd.*"}) or vector(0)
          labels:
            pool: slow

        - record: longhorn:pool_usage_ratio:sum
          expr: |
            longhorn:pool_usage_bytes:sum{pool="fast"}
            / longhorn:pool_capacity_bytes:sum{pool="fast"}
          labels:
            pool: fast

        - record: longhorn:pool_usage_ratio:sum
          expr: |
            longhorn:pool_usage_bytes:sum{pool="slow"}
            / longhorn:pool_capacity_bytes:sum{pool="slow"}
          labels:
            pool: slow

    # Pool-level alerts for aggregate storage capacity across all disks
    # in each pool (fast = SSDs, slow = HDDs).
    - name: longhorn-pool-alerts
      rules:
        - alert: LonghornStoragePoolWarning
          expr: longhorn:pool_usage_ratio:sum > 0.8
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn {{ $labels.pool }} storage pool usage > 80%"
            description: >-
              The {{ $labels.pool }} storage pool is at {{ $value | humanizePercentage }} capacity.
              Plan capacity expansion or migrate volumes to free space.

        - alert: LonghornStoragePoolCritical
          expr: longhorn:pool_usage_ratio:sum > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn {{ $labels.pool }} storage pool usage > 90%"
            description: >-
              The {{ $labels.pool }} storage pool is at {{ $value | humanizePercentage }} capacity.
              New volume scheduling may fail. Immediate action required: expand disks,
              delete unused volumes, or migrate workloads.

    - name: longhorn-media-library-alerts
      rules:
        - alert: LonghornShareManagerMemoryHigh
          expr: container_memory_working_set_bytes{pod=~"share-manager-.*"} > 4294967296
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn share-manager {{ $labels.pod }} memory > 4 GiB"
            description: >-
              Share-manager pod {{ $labels.pod }} working set is {{ $value | humanize1024 }}B.
              This may indicate the share-manager memory leak (issue #8523). Check pod age and
              consider restarting if persistent.

        - alert: LonghornDiskUsageHigh
          expr: max by (disk, node) (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) > 0.75
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn disk {{ $labels.disk }} on {{ $labels.node }} usage > 75%"
            description: >-
              Disk {{ $labels.disk }} on node {{ $labels.node }} is at
              {{ $value | humanizePercentage }} capacity. Procure next disk trio before reaching 85%.

        - alert: LonghornMediaVolumeRobustnessDegraded
          expr: max by (volume, pvc_namespace) (longhorn_volume_robustness{volume=~"media-library.*"}) != 1
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn media volume {{ $labels.volume }} is not healthy"
            description: >-
              Media volume {{ $labels.volume }} has been in a non-healthy robustness state for 30
              minutes. Robustness value {{ $value }} (1=Healthy, 2=Degraded, 3=Faulted).
              Replica loss on media volumes requires immediate attention.

        - alert: LonghornVolumeSchedulingFailed
          expr: longhorn_volume_condition{condition="Scheduled", status="False"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} cannot be scheduled"
            description: >-
              Volume {{ $labels.volume }} has an unmet scheduling condition. This usually means
              insufficient disk space on tagged disks. Check storageOverProvisioningPercentage
              and available disk capacity.

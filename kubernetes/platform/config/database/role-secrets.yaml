---
# Role password secrets for CNPG managed roles.
# Generated by secret-generator, replicated to app namespaces via kubernetes-replicator.
# CNPG reads these to manage role passwords declaratively.
apiVersion: v1
kind: Secret
metadata:
  name: authelia-role-password
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "32"
    replicator.v1.mittwald.de/replication-allowed: "true"
    replicator.v1.mittwald.de/replication-allowed-namespaces: "authelia"
type: kubernetes.io/basic-auth
stringData:
  username: authelia

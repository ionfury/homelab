---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform
spec:
  description: "Shared platform PostgreSQL cluster"
  imageName: ghcr.io/cloudnative-pg/postgresql:${postgresql_image_version}
  instances: ${default_replica_count}
  primaryUpdateStrategy: unsupervised

  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-platform-superuser

  managed:
    roles:
      - name: authelia
        ensure: present
        login: true
        passwordSecret:
          name: authelia-role-password
      - name: lldap
        ensure: present
        login: true
        passwordSecret:
          name: lldap-role-password
      - name: sonarr
        ensure: present
        login: true
        passwordSecret:
          name: sonarr-role-password
      - name: radarr
        ensure: present
        login: true
        passwordSecret:
          name: radarr-role-password
      - name: prowlarr
        ensure: present
        login: true
        passwordSecret:
          name: prowlarr-role-password
      - name: bazarr
        ensure: present
        login: true
        passwordSecret:
          name: bazarr-role-password
      - name: jellyseerr
        ensure: present
        login: true
        passwordSecret:
          name: jellyseerr-role-password
      - name: zipline
        ensure: present
        login: true
        passwordSecret:
          name: zipline-role-password
      - name: tandoor
        ensure: present
        login: true
        passwordSecret:
          name: tandoor-role-password
      - name: paperless
        ensure: present
        login: true
        passwordSecret:
          name: paperless-role-password
      - name: vaultwarden
        ensure: present
        login: true
        passwordSecret:
          name: vaultwarden-role-password
      - name: open-webui
        ensure: present
        login: true
        passwordSecret:
          name: open-webui-role-password

  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "200"
      effective_cache_size: "512MB"
      log_statement: "ddl"
      log_min_duration_statement: "1000"
    pg_hba:
      - host all all 10.0.0.0/8 scram-sha-256
      - host all all 172.16.0.0/12 scram-sha-256

  storage:
    storageClass: fast-nb
    size: ${database_volume_size}

  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-platform-backups/
      endpointURL: http://${garage_s3_endpoint}
      s3Credentials:
        accessKeyId:
          name: cnpg-platform-s3-credentials
          key: access-key-id
        secretAccessKey:
          name: cnpg-platform-s3-credentials
          key: secret-access-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

  monitoring:
    enablePodMonitor: true

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

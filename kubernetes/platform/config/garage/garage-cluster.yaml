---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage
spec:
  image: dxflrs/garage:${garage_image_version}
  zone: ${cluster_name}
  layoutPolicy: Auto
  replicas: ${default_replica_count}

  replication:
    factor: ${default_replica_count}
    consistencyMode: consistent

  monitoring:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

  storage:
    metadata:
      storageClassName: fast
      size: ${garage_meta_volume_size}
    data:
      storageClassName: fast
      size: ${garage_data_volume_size}

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  database:
    engine: lmdb

  security:
    allowInsecureSecretPermissions: true

  network:
    rpcBindPort: 3901
    service:
      type: ClusterIP

  s3Api:
    bindPort: 3900
    region: garage
    rootDomain: .s3.${internal_domain}

  webApi:
    bindPort: 3902
    rootDomain: .web.${internal_domain}

  admin:
    bindPort: 3903
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token

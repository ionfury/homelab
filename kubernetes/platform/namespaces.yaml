apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: platform-namespaces
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: enabled
    fluxcd.controlplane.io/reconcileEvery: 30m
    fluxcd.controlplane.io/reconcileTimeout: 10m
spec:
  inputs:
    # --- restricted: standard controllers with no privileged requirements ---
    - name: cert-manager
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: external-secrets
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: system
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: cnpg-system
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: database
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: dragonfly-system
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: kromgo
      dataplane: ambient
      security: restricted
      networkPolicy: false
    - name: oauth2-proxy
      dataplane: ambient
      security: restricted
      networkPolicy: false
    # --- baseline: require some elevated capabilities (e.g. NET_BIND_SERVICE) ---
    - name: cache
      dataplane: ambient
      security: baseline
      networkPolicy: false
    - name: istio-gateway
      dataplane: ambient
      security: baseline
      networkPolicy: false
    - name: garage
      dataplane: ambient
      security: baseline
      networkPolicy: false
    - name: garage-system
      dataplane: ambient
      security: baseline
      networkPolicy: false
    # --- privileged: require host access, BPF, privileged containers, or device access ---
    - name: kube-system
      dataplane: standard
      security: privileged
      networkPolicy: false
    - name: longhorn-system
      dataplane: standard
      security: privileged
      networkPolicy: false
    - name: istio-system
      dataplane: ambient
      security: privileged
      networkPolicy: false
    - name: monitoring
      dataplane: ambient
      security: privileged
      networkPolicy: false
    - name: spegel
      dataplane: standard
      security: privileged
      networkPolicy: false
    - name: gpu-system
      dataplane: standard
      security: privileged
      networkPolicy: false
      kubeApiAccess: true
    - name: system-upgrade
      dataplane: ambient
      security: privileged
      networkPolicy: false
  resourcesTemplate: |
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      name: << inputs.name >>
      <<- if inputs.networkPolicy >>
      annotations:
        <<- if inputs.networkPolicy.profile >>
        network-policy.homelab/profile: << inputs.networkPolicy.profile >>
        <<- end >>
        <<- if inputs.networkPolicy.enforcement >>
        network-policy.homelab/enforcement: << inputs.networkPolicy.enforcement >>
        <<- end >>
      <<- end >>
      labels:
        istio.io/dataplane-mode: << inputs.dataplane >>
        <<- if inputs.networkPolicy >>
        <<- if inputs.networkPolicy.profile >>
        network-policy.homelab/profile: << inputs.networkPolicy.profile >>
        <<- end >>
        <<- if inputs.networkPolicy.enforcement >>
        network-policy.homelab/enforcement: << inputs.networkPolicy.enforcement >>
        <<- end >>
        <<- end >>
        <<- if eq inputs.security "restricted" >>
        pod-security.kubernetes.io/enforce: restricted
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
        <<- else if eq inputs.security "privileged" >>
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
        pod-security.kubernetes.io/audit: baseline
        pod-security.kubernetes.io/warn: baseline
        <<- else >>
        pod-security.kubernetes.io/enforce: baseline
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
        <<- end >>
        <<- if (index inputs "kubeApiAccess") >>
        access.network-policy.homelab/kube-api: "true"
        <<- end >>

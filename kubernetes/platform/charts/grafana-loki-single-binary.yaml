---
# https://github.com/grafana/loki/blob/main/production/helm/loki/values.yaml
# yaml-language-server: $schema=https://github.com/grafana/loki/blob/main/production/helm/loki/values.schema.json
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  analytics:
    reporting_enabled: false
  server:
    log_level: info
  commonConfig:
    replication_factor: 1
  compactor:
    working_directory: /var/loki/compactor/retention
    delete_request_store: filesystem
    retention_enabled: true
  ingester:
    chunk_encoding: snappy
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"  # quote
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ruler:
    enable_api: true
    storage:
      type: local
      local:
        directory: /var/loki/rules
    alertmanager_url: http://alertmanager-operated.monitoring.svc.cluster.local:9093
    evaluation_interval: 1m
    ring:
      kvstore:
        store: inmemory
  rulerConfig:
    alerting_rules:
      fake:
        - name: waf-detection
          interval: 5m
          rules:
            - alert: CorazaWAFDetectionAnomaly
              expr: |
                sum(count_over_time({namespace="istio-gateway", container="istio-proxy"} |= "Coraza" [5m])) > 50
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Coraza WAF PL2 detection rules firing frequently"
                description: "More than 50 WAF detection-only matches in 5 minutes. Review Grafana WAF dashboard to identify false positives before promoting PL2 to blocking."
  limits_config:
    retention_period: 14d
singleBinary:
  replicas: 1
  priorityClassName: platform
  persistence:
    enabled: true
    storageClass: fast
    size: ${loki_volume_size}
gateway:
  replicas: 0
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
serviceMonitor:
  enabled: true

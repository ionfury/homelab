---
# https://github.com/dragonflydb/dragonfly-operator/blob/main/charts/dragonfly-operator/values.yaml
manager:
  priorityClassName: platform

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    memory: 256Mi

# Disable kube-rbac-proxy sidecar so the manager binds metrics to 0.0.0.0:8080
# instead of 127.0.0.1:8080, allowing Prometheus to scrape directly.
rbacProxy:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 60s

grafanaDashboard:
  enabled: true

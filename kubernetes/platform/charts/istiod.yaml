---
# https://raw.githubusercontent.com/istio/istio/master/manifests/charts/istio-control/istio-discovery/values.yaml
# yaml-language-server: $schema=https://json.schemastore.org/helm-values.json
profile: ambient

meshConfig:
  extensionProviders:
    - name: oauth2-proxy
      envoyExtAuthzHttp:
        service: oauth2-proxy.oauth2-proxy.svc.cluster.local
        port: 4180
        headersToDownstreamOnDeny:
          - content-type
          - set-cookie
          - location
        headersToUpstreamOnAllow:
          - authorization
          - cookie
          - x-auth-request-user
          - x-auth-request-email
        headersToDownstreamOnAllow:
          - set-cookie
        includeRequestHeadersInCheck:
          - authorization
          - cookie
          - x-forwarded-proto
          - x-forwarded-host
          - x-forwarded-for
        includeAdditionalHeadersInCheck:
          x-forwarded-proto: "https"
          X-Auth-Request-Redirect: "https://%REQ(:authority)%%REQ(:path)%"

# Disable built-in CA - certificates are issued by istio-csr via cert-manager
pilot:
  env:
    ENABLE_CA_SERVER: "false"

global:
  # Point to istio-csr for certificate requests
  caAddress: cert-manager-istio-csr.cert-manager.svc:443
  logAsJson: true
  priorityClassName: platform
  defaultResources:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

---
# https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-ipmi-exporter
serviceMonitor:
  enabled: false  # Using standalone ScrapeConfig for Flux variable substitution
scrapeConfig:
  enabled: false  # Using standalone ScrapeConfig for Flux variable substitution
configSecret:
  enabled: true
  name: hardware-monitoring-credentials
  key: ipmi-config.yml
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    # CPU limit intentionally omitted — ipmitool subprocess forks cause brief CPU
    # spikes incompatible with CFS rate limiting (8acbb894, d052a162).
    # K8s 1.35 rejects explicit `cpu: null` (treats as 0), so we omit entirely.
    memory: 128Mi

---
# https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-ipmi-exporter
serviceMonitor:
  enabled: false  # Using standalone ScrapeConfig for Flux variable substitution
scrapeConfig:
  enabled: false  # Using standalone ScrapeConfig for Flux variable substitution
configSecret:
  enabled: true
  name: hardware-monitoring-credentials
  key: ipmi-config.yml
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    # Chart template hardcodes `cpu: {{ .Values.resources.limits.cpu }}` rather
    # than using toYaml, so omitting the key has no effect (chart default 100m
    # leaks through Helm deep-merge). Set a generous limit instead — ipmitool
    # subprocesses cause brief CPU spikes that throttle heavily at 100m.
    cpu: "1"
    memory: 128Mi

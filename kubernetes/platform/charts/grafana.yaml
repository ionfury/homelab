---
# https://raw.githubusercontent.com/grafana/helm-charts/main/charts/grafana/values.yaml
priorityClassName: platform
deploymentStrategy:
  type: Recreate
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password
env:
  GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
  GF_EXPLORE_ENABLED: true
  GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
  GF_SECURITY_ANGULAR_SUPPORT_ENABLED: true
  GF_SERVER_ROOT_URL: https://grafana.${internal_domain}
grafana.ini:
  analytics:
    check_for_updates: false
    check_for_plugin_updates: false
    reporting_enabled: false
  auth:
    disable_login_form: true
  auth.anonymous:
    enabled: true
    org_role: Admin
  auth.proxy:
    enabled: true
    header_name: X-Auth-Request-User
    header_property: username
    auto_sign_up: true
    headers: "Email:X-Auth-Request-Email"
  news:
    news_feed_enabled: false
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - { name: Alertmanager, orgId: 1 }
      - { name: Loki, orgId: 1 }
      - { name: Prometheus, orgId: 1 }
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-operated.monitoring.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-headless.monitoring.svc.cluster.local:3100
        jsonData:
          maxLines: 250
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://alertmanager-operated.monitoring.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: infrastructure
        orgId: 1
        folder: Infrastructure
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infrastructure
      - name: network
        orgId: 1
        folder: Network
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/network
      - name: storage
        orgId: 1
        folder: Storage
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/storage
      - name: hardware
        orgId: 1
        folder: Hardware
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/hardware
      - name: applications
        orgId: 1
        folder: Applications
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/applications
      - name: platform-services
        orgId: 1
        folder: Platform Services
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/platform-services
      - name: database
        orgId: 1
        folder: Database
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/database
      - name: power
        orgId: 1
        folder: Power
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/power
      - name: sre
        orgId: 1
        folder: SRE
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/sre
dashboards:
  kubernetes:
    kubernetes-global:
      # renovate: depName="Kubernetes / Views / Global"
      gnetId: 15757
      revision: 42
      datasource: Prometheus
    kubernetes-namespaces:
      # renovate: depName="Kubernetes / Views / Namespaces"
      gnetId: 15758
      revision: 41
      datasource: Prometheus
    kubernetes-nodes:
      # renovate: depName="Kubernetes / Views / Nodes"
      gnetId: 15759
      revision: 32
      datasource: Prometheus
    kubernetes-pods:
      # renovate: depName="Kubernetes / Views / Pods"
      gnetId: 15760
      revision: 34
      datasource: Prometheus
    kubernetes-api-server:
      # renovate: depName="Kubernetes / System / API Server"
      gnetId: 15761
      revision: 18
      datasource: Prometheus
    kubernetes-coredns:
      # renovate: depName="Kubernetes / System / CoreDNS"
      gnetId: 15762
      revision: 19
      datasource: Prometheus
  infrastructure:
    node-exporter-full:
      # renovate: depName="Node Exporter Full"
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    prometheus:
      # renovate: depName="Prometheus"
      gnetId: 19105
      revision: 6
      datasource: Prometheus
    flux-cluster:
      url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/cluster.json
      datasource: Prometheus
    flux-control-plane:
      url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/control-plane.json
      datasource: Prometheus
  network:
    cloudflared:
      # renovate: depName="Cloudflare Tunnels (cloudflared)"
      gnetId: 17457
      revision: 6
      datasource:
        - { name: DS_PROMETHEUS, value: Prometheus }
    istio-mesh:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/istio-mesh-dashboard.gen.json
      datasource: Prometheus
    istio-service:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/istio-service-dashboard.json
      datasource: Prometheus
    istio-workload:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/istio-workload-dashboard.json
      datasource: Prometheus
    istio-control-plane:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/pilot-dashboard.gen.json
      datasource: Prometheus
    istio-performance:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/istio-performance-dashboard.json
      datasource: Prometheus
    istio-ztunnel:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/ztunnel-dashboard.gen.json
      datasource: Prometheus
    istio-wasm-extensions:
      url: https://raw.githubusercontent.com/istio/istio/master/manifests/addons/dashboards/istio-extension-dashboard.json
      datasource: Prometheus
    unifi-insights:
      # renovate: depName="UniFi-Poller: Client Insights - Prometheus"
      gnetId: 11315
      revision: 9
      datasource: Prometheus
    unifi-network-sites:
      # renovate: depName="UniFi-Poller: Network Sites - Prometheus"
      gnetId: 11311
      revision: 5
      datasource: Prometheus
    unifi-uap:
      # renovate: depName="UniFi-Poller: UAP Insights - Prometheus"
      gnetId: 11314
      revision: 10
      datasource: Prometheus
    unifi-usw:
      # renovate: depName="UniFi-Poller: USW Insights - Prometheus"
      gnetId: 11312
      revision: 9
      datasource: Prometheus
  storage:
    kubernetes-volumes:
      # renovate: depName="K8s / Storage / Volumes / Cluster"
      gnetId: 11454
      revision: 14
      datasource: Prometheus
    longhorn:
      # renovate: depName="Longhorn Dashboard"
      gnetId: 22705
      revision: 1
      datasource: Prometheus
  hardware:
    smartctl-exporter:
      # renovate: depName="SMARTctl Exporter Dashboard"
      gnetId: 22604
      revision: 2
      datasource:
        - { name: DS_PROMETHEUS, value: Prometheus }
    node-feature-discovery:
      url: https://raw.githubusercontent.com/kubernetes-sigs/node-feature-discovery/master/examples/grafana-dashboard.json
      datasource: Prometheus
    ipmi-exporter:
      # renovate: depName="IPMI Exporter"
      gnetId: 15765
      revision: 2
      datasource: Prometheus
    nvidia-dcgm-exporter:
      # renovate: depName="NVIDIA DCGM Exporter Dashboard"
      gnetId: 12239
      revision: 2
      datasource: Prometheus
  applications:
    miniflux:
      url: https://raw.githubusercontent.com/miniflux/v2/main/contrib/grafana/dashboard.json
      datasource: Prometheus
    exportarr:
      url: https://raw.githubusercontent.com/onedr0p/exportarr/master/examples/grafana/dashboard2.json
      datasource: Prometheus
    unpackerr:
      # renovate: depName="Unpackerr"
      gnetId: 18817
      revision: 1
      datasource: Prometheus
  platform-services:
    cert-manager:
      # renovate: depName="Cert-manager-Kubernetes"
      gnetId: 20842
      revision: 3
      datasource: Prometheus
    external-dns:
      # renovate: depName="External-dns"
      gnetId: 15038
      revision: 3
      datasource: Prometheus
    external-secrets:
      url: https://raw.githubusercontent.com/external-secrets/external-secrets/main/docs/snippets/dashboard.json
      datasource: Prometheus
    alertmanager:
      # renovate: depName="Alertmanager"
      gnetId: 9578
      revision: 4
      datasource: Prometheus
    loki-logs:
      # renovate: depName="Loki Logs Dashboard"
      gnetId: 15324
      revision: 1
      datasource: Prometheus
  database:
    cloudnative-pg:
      # renovate: depName="CloudNativePG"
      gnetId: 20417
      revision: 4
      datasource: Prometheus
    dragonfly:
      # renovate: depName="Dragonfly"
      gnetId: 11692
      revision: 1
      datasource: Prometheus
  power:
    apc-ups-snmp:
      # renovate: depName="APC UPS (SNMP)"
      gnetId: 12340
      revision: 1
      datasource: Prometheus
  sre:
    kubernetes-capacity-planning:
      # renovate: depName="Kubernetes Capacity Planning"
      gnetId: 5499
      revision: 1
      datasource: Prometheus
    golden-signals:
      # renovate: depName="Monitoring Golden Signals"
      gnetId: 21073
      revision: 1
      datasource: Prometheus
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    folderAnnotation: grafana_folder
    provider:
      disableDelete: true
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    searchNamespace: ALL
    labelValue: ""
plugins:
  - grafana-clock-panel
  - grafana-piechart-panel
  - grafana-worldmap-panel
  - natel-discrete-panel
  - pr0ps-trackmap-panel
  - vonage-status-panel
serviceMonitor:
  enabled: true
persistence:
  enabled: false
imageRenderer:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
testFramework:
  enabled: false

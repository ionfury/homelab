---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Kubernetes Validate

on:
  pull_request:
    paths:
      - "kubernetes/**"
      - ".github/workflows/kubernetes-validate.yaml"
      - ".yamllint.yaml"
      - ".taskfiles/kubernetes/**"
      - ".mise.toml"
  workflow_dispatch:

jobs:
  # Job 1: Cluster-independent validation (lint, ResourceSets, Helm)
  validate-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Check Talos/Kubernetes version compatibility
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TALOS=$(grep '^talos_version=' kubernetes/platform/versions.env | cut -d= -f2)
          K8S=$(grep '^kubernetes_version=' kubernetes/platform/versions.env | cut -d= -f2)

          # Derive compat package from Talos minor (e.g. v1.13.5 -> talos113)
          TALOS_MINOR=$(echo "${TALOS}" | grep -oP 'v\K\d+\.\d+' | tr -d '.')
          COMPAT_PATH="pkg/machinery/compatibility/talos${TALOS_MINOR}/talos${TALOS_MINOR}.go"

          COMPAT=$(gh api "/repos/siderolabs/talos/contents/${COMPAT_PATH}?ref=${TALOS}" \
            --jq '.content' | base64 -d)

          K8S_MIN=$(echo "${COMPAT}" | grep -oP 'MinimumKubernetesVersion\s*=\s*semver\.MustParse\("\K[\d.]+')
          K8S_MAX=$(echo "${COMPAT}" | grep -oP 'MaximumKubernetesVersion\s*=\s*semver\.MustParse\("\K[\d.]+')

          echo "Talos ${TALOS} supports Kubernetes ${K8S_MIN} - ${K8S_MAX}"
          echo "Configured: ${K8S}"

          if ! printf '%s\n%s\n%s\n' "${K8S_MIN}" "${K8S}" "${K8S_MAX}" | sort -V -C; then
            echo "ERROR: kubernetes_version=${K8S} outside supported range [${K8S_MIN}, ${K8S_MAX}] for Talos ${TALOS}" >&2
            exit 1
          fi

      - name: Validate (cluster-independent)
        run: task k8s:validate

  # Job 2: Discover clusters with .cluster-vars.env
  discover-clusters:
    runs-on: ubuntu-latest
    outputs:
      clusters: ${{ steps.discover.outputs.clusters }}
      has_clusters: ${{ steps.discover.outputs.has_clusters }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Discover clusters
        id: discover
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const clustersDir = 'kubernetes/clusters';
            const clusters = [];

            // Read cluster directories
            const entries = fs.readdirSync(clustersDir, { withFileTypes: true });
            for (const entry of entries) {
              if (entry.isDirectory()) {
                const varsFile = path.join(clustersDir, entry.name, '.cluster-vars.env');
                if (fs.existsSync(varsFile)) {
                  clusters.push(entry.name);
                }
              }
            }

            clusters.sort();
            const clustersJson = JSON.stringify(clusters);

            core.setOutput('clusters', clustersJson);
            core.setOutput('has_clusters', clusters.length > 0 ? 'true' : 'false');

            if (clusters.length === 0) {
              core.info('No clusters with .cluster-vars.env found');
            } else {
              core.info(`Discovered clusters: ${clustersJson}`);
            }

  # Job 3: Per-cluster validation (separate status check per cluster)
  validate-cluster:
    needs: [validate-base, discover-clusters]
    if: needs.discover-clusters.outputs.has_clusters == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJson(needs.discover-clusters.outputs.clusters) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Validate cluster
        env:
          CLUSTER: ${{ matrix.cluster }}
        run: task k8s:validate-$CLUSTER

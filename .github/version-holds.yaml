# Version holds — dependencies pinned due to upstream regressions.
# A scheduled workflow (check-version-holds.yaml) monitors the upstream issues
# and opens a tracking issue when they close.
#
# See docs/runbooks/version-holds.md for the full lifecycle.
holds:
  - dep: gluetun
    constraint: "!/^v3\\.41\\./"
    reason: "v3.41.x healthcheck regression blocks DNS queries to kube-dns after VPN tunnel establishment"
    upstream_issue: https://github.com/qdm12/gluetun/issues/3132
    created: "2026-02-18"
  - dep: siderolabs/talos
    constraint: "< 0.11.0"
    reason: "0.11.0 on_destroy.reset Value Conversion Error causes all plan/validate operations to fail"
    upstream_issue: https://github.com/siderolabs/terraform-provider-talos/issues/334
    created: "2026-05-06"
  - dep: talos
    constraint: "!/^v1\\.13\\.3$/"
    reason: "v1.13.3 RenderConfigsStaticPodController panics with 'cannot deep copy int' on any custom scheduler.config with integer fields, breaking kube-apiserver"
    upstream_issue: https://github.com/siderolabs/talos/issues/13445
    created: "2026-05-28"
